<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS Studio — Kamalish Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  window.WEBSITE_ORIGIN = 'http://localhost:4173';
</script>
<style>
/* ======================================================
   ELEMENTOR-STYLE CMS — COMPLETE DESIGN SYSTEM
   ====================================================== */
:root {
  /* Sidebar dark theme */
  --sb-bg: #1e1e1e;
  --sb-bg-light: #272727;
  --sb-bg-hover: #333333;
  --sb-bg-active: #404040;
  --sb-border: #3a3a3a;
  --sb-text: #bfbfbf;
  --sb-text-bright: #e0e0e0;
  --sb-text-muted: #808080;
  --sb-accent: #93c5fd;
  --sb-accent-bg: rgba(147,197,253,0.12);
  --sb-danger: #f87171;

  /* Header bar */
  --hdr-bg: #000000;
  --hdr-border: #2a2a2a;

  /* Preview area */
  --preview-bg: #e5e7eb;

  /* Inspector */
  --inp-bg: #2a2a2a;
  --inp-border: #3e3e3e;
  --inp-text: #e0e0e0;
  --inp-focus: #93c5fd;

  /* Status colors */
  --green: #10b981;
  --green-dark: #059669;
  --amber: #f59e0b;
  --red: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-size: 13px;
  background: var(--sb-bg);
  color: var(--sb-text);
  overflow: hidden;
  height: 100vh;
}
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }

/* ---- MAIN LAYOUT ---- */
.cms-app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ---- TOP HEADER BAR ---- */
.cms-header {
  display: flex;
  align-items: center;
  height: 48px;
  background: var(--hdr-bg);
  border-bottom: 1px solid var(--hdr-border);
  padding: 0 12px;
  gap: 8px;
  flex-shrink: 0;
  z-index: 100;
}
.cms-header__logo {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: #93c5fd;
  border-radius: 4px;
  color: #000;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.3px;
  border: none;
  transition: opacity 0.15s;
}
.cms-header__logo:hover { opacity: 0.9; }
.cms-header__logo svg { width: 18px; height: 18px; }
.cms-header__sep { width: 1px; height: 28px; background: var(--hdr-border); margin: 0 4px; }

/* Responsive preview toggles */
.cms-header__responsive {
  display: flex;
  align-items: center;
  gap: 2px;
  margin-left: 8px;
}
.cms-header__responsive button {
  width: 36px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; color: #666;
  border-radius: 4px; transition: all 0.15s;
  font-size: 16px;
}
.cms-header__responsive button:hover { color: #999; background: rgba(255,255,255,0.06); }
.cms-header__responsive button.active { color: var(--sb-accent); background: var(--sb-accent-bg); }

.cms-header__spacer { flex: 1; }

/* Page selector pills */
.cms-header__pages {
  display: flex;
  align-items: center;
  gap: 6px;
  overflow-x: auto;
  max-width: 50vw;
  scrollbar-width: none;
}
.cms-header__pages::-webkit-scrollbar { display: none; }
.page-pill {
  padding: 5px 14px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  background: var(--sb-bg-light);
  border: 1px solid var(--sb-border);
  color: var(--sb-text);
  transition: all 0.15s;
}
.page-pill:hover { background: var(--sb-bg-hover); color: var(--sb-text-bright); }
.page-pill.active { background: var(--sb-accent); color: #000; border-color: var(--sb-accent); font-weight: 600; }
.page-pill--add {
  background: none;
  border: 1px dashed var(--sb-text-muted);
  color: var(--sb-text-muted);
  font-size: 12px;
}
.page-pill--add:hover { border-color: var(--sb-accent); color: var(--sb-accent); }

/* Header actions */
.cms-header__actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 12px;
}
.btn-publish {
  padding: 7px 20px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  transition: background 0.15s;
}
.btn-publish:hover { background: var(--green-dark); }
.btn-publish:disabled { background: #374151; color: #6b7280; cursor: default; }
.status-dot {
  font-size: 11px;
  color: var(--sb-text-muted);
  white-space: nowrap;
}
.status-dot.dirty { color: var(--amber); }
.status-dot.saved { color: var(--green); }

/* ---- BODY: SIDEBAR + PREVIEW ---- */
.cms-body {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* ---- LEFT SIDEBAR ---- */
.cms-sidebar {
  width: 300px;
  flex-shrink: 0;
  background: var(--sb-bg);
  border-right: 1px solid var(--sb-border);
  display: flex;
  flex-direction: column;
  transition: width 0.25s, transform 0.25s;
  z-index: 50;
  overflow: hidden;
}
.cms-sidebar.collapsed { width: 0; border-right: none; }

/* Sidebar tabs */
.sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--sb-border);
  flex-shrink: 0;
}
.sidebar-tabs button {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 12px 4px 10px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--sb-text-muted);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  transition: all 0.15s;
}
.sidebar-tabs button svg { width: 20px; height: 20px; opacity: 0.5; transition: opacity 0.15s; }
.sidebar-tabs button:hover { color: var(--sb-text); background: var(--sb-bg-light); }
.sidebar-tabs button:hover svg { opacity: 0.8; }
.sidebar-tabs button.active { color: var(--sb-accent); border-bottom-color: var(--sb-accent); }
.sidebar-tabs button.active svg { opacity: 1; }

/* Sidebar panels */
.sidebar-panel {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--sb-bg-active) transparent;
}
.sidebar-panel::-webkit-scrollbar { width: 5px; }
.sidebar-panel::-webkit-scrollbar-track { background: transparent; }
.sidebar-panel::-webkit-scrollbar-thumb { background: var(--sb-bg-active); border-radius: 3px; }

.sidebar-panel h3 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--sb-text-muted);
  margin-bottom: 12px;
}
.sidebar-panel .hint {
  font-size: 11px;
  color: var(--sb-text-muted);
  line-height: 1.5;
  margin-bottom: 16px;
}

/* ---- WIDGET GRID (Elements Tab) ---- */
.widget-search {
  width: 100%;
  padding: 8px 12px;
  background: var(--inp-bg);
  border: 1px solid var(--inp-border);
  border-radius: 6px;
  color: var(--inp-text);
  font-size: 12px;
  margin-bottom: 16px;
  outline: none;
  transition: border-color 0.15s;
}
.widget-search:focus { border-color: var(--sb-accent); }
.widget-search::placeholder { color: var(--sb-text-muted); }

.widget-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}
.widget-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 14px 6px;
  background: var(--sb-bg-light);
  border: 1px solid var(--sb-border);
  border-radius: 6px;
  color: var(--sb-text);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.3px;
  transition: all 0.2s;
}
.widget-card:hover {
  background: var(--sb-accent-bg);
  border-color: var(--sb-accent);
  color: var(--sb-accent);
  transform: translateY(-1px);
}
.widget-card svg { width: 22px; height: 22px; opacity: 0.7; }
.widget-card:hover svg { opacity: 1; }

/* Pulse animation on successful add */
@keyframes widgetPulse {
  0% { box-shadow: 0 0 0 0 rgba(147,197,253,0.4); }
  70% { box-shadow: 0 0 0 8px rgba(147,197,253,0); }
  100% { box-shadow: 0 0 0 0 rgba(147,197,253,0); }
}
.widget-card.pulse { animation: widgetPulse 0.6s ease-out; }

/* ---- NAVIGATOR TREE ---- */
.nav-tree { display: flex; flex-direction: column; gap: 2px; }
.nav-tree-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 10px;
  background: none;
  border: none;
  border-radius: 4px;
  color: var(--sb-text);
  font-size: 12px;
  text-align: left;
  width: 100%;
  transition: all 0.12s;
}
.nav-tree-item:hover { background: var(--sb-bg-hover); }
.nav-tree-item.active { background: var(--sb-accent-bg); color: var(--sb-accent); }
.nav-tree-item.default { border-left: 3px solid #a78bfa; padding-left: 7px; }
.nav-tree-item.default.active { border-left-color: var(--sb-accent); }
.nav-tree-item__icon { width: 16px; font-size: 12px; text-align: center; flex-shrink: 0; opacity: 0.6; }
.nav-tree-item__label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-tree-item__badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  background: var(--sb-bg-active);
  color: var(--sb-text-muted);
  flex-shrink: 0;
}

.nav-tree-section { margin-bottom: 4px; }
.nav-tree-blocks { margin-left: 22px; display: flex; flex-direction: column; gap: 1px; }
.nav-tree-blocks .nav-tree-item { font-size: 11px; padding: 5px 8px; }

.nav-add-section {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  margin-top: 8px;
  background: none;
  border: 1px dashed var(--sb-border);
  border-radius: 6px;
  color: var(--sb-text-muted);
  font-size: 12px;
  width: 100%;
  transition: all 0.15s;
}
.nav-add-section:hover { border-color: var(--sb-accent); color: var(--sb-accent); }

/* ---- SETTINGS PANEL ---- */
.settings-group {
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--sb-border);
}
.settings-group:last-child { border-bottom: none; }
.settings-group h4 {
  font-size: 12px;
  font-weight: 600;
  color: var(--sb-text-bright);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.settings-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.settings-actions button {
  padding: 6px 14px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  border: none;
  transition: all 0.15s;
}
.settings-actions .btn-save-theme {
  background: var(--sb-accent);
  color: #000;
}
.settings-actions .btn-save-theme:hover { opacity: 0.9; }
.settings-actions .btn-save-theme:disabled { opacity: 0.4; cursor: default; }
.settings-actions .btn-reset-theme {
  background: var(--sb-bg-hover);
  color: var(--sb-text);
  border: 1px solid var(--sb-border);
}
.settings-actions .btn-reset-theme:hover { background: var(--sb-bg-active); }
.settings-status { font-size: 11px; color: var(--sb-text-muted); margin-left: 8px; }
.settings-status.dirty { color: var(--amber); }
.settings-status.saved { color: var(--green); }

/* ---- FORM CONTROLS (dark theme) ---- */
.ctl-field { margin-bottom: 14px; }
.ctl-field > label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--sb-text-muted);
  margin-bottom: 6px;
}
.ctl-input, .ctl-textarea, .ctl-select {
  width: 100%;
  padding: 8px 10px;
  background: var(--inp-bg);
  border: 1px solid var(--inp-border);
  border-radius: 4px;
  color: var(--inp-text);
  font-size: 12px;
  outline: none;
  transition: border-color 0.15s;
}
.ctl-input:focus, .ctl-textarea:focus, .ctl-select:focus { border-color: var(--inp-focus); }
.ctl-textarea { min-height: 60px; resize: vertical; }
.ctl-select { cursor: pointer; }
.ctl-color-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.ctl-color-row input[type="color"] {
  width: 36px;
  height: 32px;
  padding: 2px;
  border: 1px solid var(--inp-border);
  border-radius: 4px;
  background: var(--inp-bg);
  cursor: pointer;
  flex-shrink: 0;
}
.ctl-color-row input[type="text"] {
  flex: 1;
  padding: 7px 9px;
  background: var(--inp-bg);
  border: 1px solid var(--inp-border);
  border-radius: 4px;
  color: var(--inp-text);
  font-size: 12px;
  font-family: 'SF Mono', 'Cascadia Code', monospace;
  outline: none;
}
.ctl-color-row input[type="text"]:focus { border-color: var(--inp-focus); }
.ctl-color-row .ctl-clear {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: 1px solid var(--inp-border);
  border-radius: 4px;
  color: var(--sb-text-muted);
  font-size: 10px;
  flex-shrink: 0;
}
.ctl-color-row .ctl-clear:hover { border-color: var(--sb-danger); color: var(--sb-danger); }
.ctl-number { width: 100%; }
.ctl-checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.ctl-checkbox-row input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--sb-accent);
}

/* ---- INSPECTOR (replaces default widgets when something selected) ---- */
.inspector-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 12px;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--sb-border);
}
.inspector-header h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--sb-text-bright);
  margin: 0;
  text-transform: none;
  letter-spacing: 0;
}
.inspector-header .inspector-back {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--sb-bg-hover);
  border: none;
  border-radius: 4px;
  color: var(--sb-text);
  font-size: 14px;
  flex-shrink: 0;
}
.inspector-header .inspector-back:hover { background: var(--sb-bg-active); }

/* Props tabs */
.props-tabs {
  display: flex;
  margin: -16px -16px 16px -16px;
  border-bottom: 1px solid var(--sb-border);
  background: rgba(0,0,0,0.2);
}
.props-tabs button {
  flex: 1;
  padding: 10px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--sb-text-muted);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  transition: all 0.12s;
}
.props-tabs button:hover { color: var(--sb-text); }
.props-tabs button.active { color: var(--sb-accent); border-bottom-color: var(--sb-accent); }

/* Inspector actions */
.inspector-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--sb-border);
}
.inspector-actions button {
  padding: 5px 10px;
  background: var(--sb-bg-hover);
  border: 1px solid var(--sb-border);
  border-radius: 4px;
  color: var(--sb-text);
  font-size: 11px;
  transition: all 0.12s;
}
.inspector-actions button:hover { background: var(--sb-bg-active); border-color: var(--sb-text-muted); }
.inspector-actions button.danger { color: var(--sb-danger); }
.inspector-actions button.danger:hover { border-color: var(--sb-danger); background: rgba(248,113,113,0.1); }

/* Image control (dark themed) */
.img-control { display: flex; gap: 10px; align-items: flex-start; }
.img-control__thumb { width: 80px; height: 56px; object-fit: cover; border: 1px solid var(--inp-border); border-radius: 4px; background: var(--inp-bg); }
.img-control__body { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.img-control__upload {
  padding: 5px 10px;
  background: var(--sb-bg-hover);
  border: 1px solid var(--sb-border);
  border-radius: 4px;
  color: var(--sb-text);
  font-size: 11px;
  align-self: flex-start;
}
.img-control__upload:hover { background: var(--sb-bg-active); }

/* ---- PREVIEW AREA ---- */
.cms-preview {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--preview-bg);
}
.cms-preview__toolbar {
  display: none; /* page pills are in header now */
}
.cms-preview__frame-wrap {
  flex: 1;
  display: flex;
  justify-content: center;
  padding: 0;
  overflow: hidden;
  transition: padding 0.3s;
}
.cms-preview__frame-wrap.tablet { padding: 16px; }
.cms-preview__frame-wrap.mobile { padding: 16px; }

.cms-preview__frame {
  width: 100%;
  height: 100%;
  border: none;
  background: #fff;
  transition: max-width 0.3s, border-radius 0.3s, box-shadow 0.3s;
}
.cms-preview__frame-wrap.tablet .cms-preview__frame {
  max-width: 768px;
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.cms-preview__frame-wrap.mobile .cms-preview__frame {
  max-width: 375px;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

/* ---- BOTTOM BAR ---- */
.cms-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 40px;
  padding: 0 16px;
  background: var(--hdr-bg);
  border-top: 1px solid var(--hdr-border);
  flex-shrink: 0;
}
.cms-bottom__status {
  font-size: 11px;
  color: var(--sb-text-muted);
}
.cms-bottom__status.dirty { color: var(--amber); }
.cms-bottom__status.saved { color: var(--green); }
.cms-bottom__btn {
  padding: 5px 16px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.cms-bottom__btn:disabled { background: #374151; color: #6b7280; cursor: default; }
.cms-bottom__btn:not(:disabled):hover { background: var(--green-dark); }

/* ---- ADD PAGE MODAL ---- */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal {
  background: #1e1e1e;
  border: 1px solid #3a3a3a;
  border-radius: 12px;
  padding: 28px 30px 24px;
  width: 420px;
  max-width: 90vw;
  box-shadow: 0 24px 64px rgba(0,0,0,0.4);
}
.modal h3 { color: #e0e0e0; font-size: 18px; margin-bottom: 6px; }
.modal p { color: #808080; font-size: 12px; margin-bottom: 16px; line-height: 1.5; }
.modal .ctl-field { margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.modal-actions button { padding: 8px 18px; font-size: 13px; border-radius: 6px; font-weight: 600; }
.modal-cancel { background: var(--sb-bg-hover); border: 1px solid var(--sb-border); color: var(--sb-text); }
.modal-confirm { background: var(--sb-accent); border: none; color: #000; }

/* Toast */
.toast {
  position: fixed;
  bottom: 60px;
  right: 24px;
  background: #1e1e1e;
  color: #e0e0e0;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.25s;
  pointer-events: none;
  z-index: 9999;
  border: 1px solid #3a3a3a;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.toast.show { opacity: 1; transform: none; }
.toast.err { border-color: var(--red); }

/* ---- PAGE DATA EDITOR (inside Settings) ---- */
.page-data-section { margin-top: 8px; }
.page-data-toc {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 14px;
}
.page-data-toc a {
  padding: 4px 10px;
  font-size: 11px;
  border-radius: 4px;
  background: var(--sb-bg-light);
  color: var(--sb-text-muted);
  text-decoration: none;
  border: 1px solid var(--sb-border);
  transition: all 0.12s;
}
.page-data-toc a:hover { color: var(--sb-text); border-color: var(--sb-text-muted); }
.page-data-toc a.active { color: var(--sb-accent); border-color: var(--sb-accent); background: var(--sb-accent-bg); }

.page-data-panel {
  background: var(--sb-bg-light);
  border: 1px solid var(--sb-border);
  border-radius: 6px;
  padding: 14px;
  margin-bottom: 14px;
}
.page-data-panel h4 {
  font-size: 12px;
  color: var(--sb-text-bright);
  margin-bottom: 4px;
}
.page-data-panel .hint {
  font-size: 11px;
  color: var(--sb-text-muted);
  margin-bottom: 12px;
}

/* List items in page data */
.list-item {
  background: var(--sb-bg);
  border: 1px solid var(--sb-border);
  border-radius: 6px;
  padding: 12px;
  margin-bottom: 8px;
  position: relative;
}
.list-item .itemtools {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  gap: 4px;
}
.itemtools button {
  width: 24px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--sb-bg-light);
  border: 1px solid var(--sb-border);
  border-radius: 3px;
  color: var(--sb-text-muted);
  font-size: 11px;
}
.itemtools button:hover { color: var(--sb-text); border-color: var(--sb-text-muted); }
.itemtools button.del:hover { color: var(--sb-danger); border-color: var(--sb-danger); }

.addbtn {
  background: none;
  border: 1px dashed var(--sb-border);
  color: var(--sb-text-muted);
  width: 100%;
  padding: 8px;
  border-radius: 4px;
  font-size: 11px;
}
.addbtn:hover { color: var(--sb-accent); border-color: var(--sb-accent); }

/* Style row (Aa overrides) */
.aa-btn {
  margin-left: auto;
  background: var(--sb-bg-hover);
  border: 1px solid var(--sb-border);
  border-radius: 3px;
  font-size: 10px;
  padding: 2px 7px;
  cursor: pointer;
  color: var(--sb-text-muted);
  text-transform: none;
  letter-spacing: 0;
}
.aa-btn.on { border-color: var(--sb-accent); color: var(--sb-accent); }
.stylerow {
  border: 1px solid var(--sb-border);
  border-radius: 4px;
  padding: 10px;
  margin: 6px 0 8px;
  background: var(--sb-bg);
}
.stylerow .row { display: flex; gap: 6px; margin-bottom: 6px; }
.stylerow select, .stylerow input[type=number], .stylerow input[type=text] {
  flex: 1;
  min-width: 0;
  padding: 6px 8px;
  font-size: 11px;
  background: var(--inp-bg);
  border: 1px solid var(--inp-border);
  border-radius: 4px;
  color: var(--inp-text);
  outline: none;
}
.stylerow input[type=color] {
  width: 36px;
  height: 30px;
  padding: 2px;
  border: 1px solid var(--inp-border);
  border-radius: 4px;
  background: var(--inp-bg);
}

/* Font field */
.fontfield { margin-bottom: 14px; }
.fontfield label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--sb-text-muted); margin-bottom: 6px; }
.fontfield select, .fontfield input[type=text] {
  width: 100%;
  padding: 8px 10px;
  background: var(--inp-bg);
  border: 1px solid var(--inp-border);
  border-radius: 4px;
  color: var(--inp-text);
  font-size: 12px;
  outline: none;
}
.fontfield input[type=text] { margin-top: 6px; }

/* Color field */
.colorfield { margin-bottom: 14px; }
.colorfield label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--sb-text-muted); margin-bottom: 6px; }
.colorfield__row { display: flex; gap: 6px; align-items: center; }
.colorfield__row input[type=color] { width: 36px; height: 32px; padding: 2px; border: 1px solid var(--inp-border); border-radius: 4px; background: var(--inp-bg); }
.colorfield__row input[type=text] { flex: 1; padding: 7px 9px; font: 12px/1.4 'SF Mono', 'Cascadia Code', monospace; background: var(--inp-bg); border: 1px solid var(--inp-border); border-radius: 4px; color: var(--inp-text); outline: none; }

/* ======================================================
   POLISH LAYER — focus rings, smoother states, tidier chrome
   ====================================================== */
.ctl-input:focus, .ctl-textarea:focus, .ctl-select:focus,
.colorfield__row input[type=text]:focus {
  border-color: var(--inp-focus);
  box-shadow: 0 0 0 3px var(--sb-accent-bg);
}
.ctl-input, .ctl-select, .ctl-textarea { transition: border-color .15s, box-shadow .15s; }

/* Custom scrollbars so panels feel native-dark */
.sidebar-panel, #blocksInspector, #secList, .page-data-panel { scrollbar-width: thin; scrollbar-color: #4a4a4a transparent; }
.sidebar-panel::-webkit-scrollbar, #blocksInspector::-webkit-scrollbar, #secList::-webkit-scrollbar { width: 9px; }
.sidebar-panel::-webkit-scrollbar-thumb, #blocksInspector::-webkit-scrollbar-thumb, #secList::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 6px; border: 2px solid var(--sb-bg); }
.sidebar-panel::-webkit-scrollbar-thumb:hover, #blocksInspector::-webkit-scrollbar-thumb:hover, #secList::-webkit-scrollbar-thumb:hover { background: #5c5c5c; }

/* Navigator layers: clearer active + hover, accent rail on selection */
.nav-tree-item { transition: background .12s, color .12s; border-radius: 5px; }
.nav-tree-item:hover { background: var(--sb-bg-hover); color: var(--sb-text-bright); }
.nav-tree-item.active { background: var(--sb-accent-bg); color: var(--sb-accent); box-shadow: inset 2px 0 0 var(--sb-accent); }
.nav-tree-item__badge { opacity: .8; }

/* Widget cards: gentle lift on hover */
.widget-card { transition: transform .1s, border-color .12s, background .12s; }
.widget-card:hover { transform: translateY(-1px); }

/* Inspector reads as a tidy stack */
#blocksInspector { padding: 16px; }
.ctl-field > label { color: var(--sb-text); }
.props-tabs button.active { background: rgba(147,197,253,0.06); }

/* Buttons feel consistent */
.inspector-actions button, .ctl-btn { border-radius: 5px; }

/* Small helper text */
.hint { font-size: 11px; line-height: 1.5; color: var(--sb-text-muted); }

/* ======================================================
   LIGHT REDESIGN — 3-column builder UI (InnoSite-style)
   Later rules override the dark theme above.
   ====================================================== */
:root {
  --sb-bg: #ffffff;
  --sb-bg-light: #f7f8fb;
  --sb-bg-hover: #f1f2f7;
  --sb-bg-active: #e9eaf4;
  --sb-border: #e7e9f0;
  --sb-text: #4b5163;
  --sb-text-bright: #0f172a;
  --sb-text-muted: #8a91a3;
  --sb-accent: #6366f1;
  --sb-accent-bg: rgba(99,102,241,0.10);
  --sb-danger: #ef4444;
  --hdr-bg: #ffffff;
  --hdr-border: #e7e9f0;
  --preview-bg: #eef0f5;
  --inp-bg: #ffffff;
  --inp-border: #dfe2ec;
  --inp-text: #1f2430;
  --inp-focus: #6366f1;
}
body { background: var(--preview-bg); color: var(--sb-text); }

/* ---- Header ---- */
.cms-header {
  display: flex; align-items: center; justify-content: space-between;
  background: #fff; border-bottom: 1px solid var(--sb-border);
  padding: 8px 14px; height: 52px; gap: 12px;
}
.cms-header__left { flex: 1; display: flex; align-items: center; min-width: 0; }
.cms-header__center { display: flex; align-items: center; gap: 6px; }
.cms-header__actions { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
.cms-header__sep { width: 1px; height: 22px; background: var(--sb-border); margin: 0 4px; }

.pages-crumb { position: relative; display: flex; align-items: center; gap: 6px; font-size: 13px; }
.pages-crumb__root, .pages-crumb__sep { color: var(--sb-text-muted); }
.pages-crumb__page { background: none; border: none; font-weight: 600; font-size: 13px; color: var(--sb-text-bright); padding: 5px 8px; border-radius: 7px; }
.pages-crumb__page:hover { background: var(--sb-bg-hover); }
.pages-dropdown { position: absolute; top: 100%; left: 0; margin-top: 6px; min-width: 210px; background: #fff; border: 1px solid var(--sb-border); border-radius: 10px; box-shadow: 0 14px 36px rgba(15,23,42,.14); padding: 6px; display: none; z-index: 300; }
.pages-dropdown.open { display: block; }
.pages-dropdown .cms-header__pages { display: flex; flex-direction: column; gap: 2px; }
.page-pill { text-align: left; background: none; border: none; border-radius: 7px; padding: 8px 10px; font-size: 12.5px; color: var(--sb-text); }
.page-pill:hover { background: var(--sb-bg-hover); color: var(--sb-text-bright); }
.page-pill.active { background: var(--sb-accent-bg); color: var(--sb-accent); font-weight: 600; }
.page-pill--add { color: var(--sb-accent); border-top: 1px solid var(--sb-border); border-radius: 0 0 7px 7px; margin-top: 4px; }

.icon-btn { width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; background: none; border: none; border-radius: 7px; color: var(--sb-text); font-size: 15px; transition: background .12s; }
.icon-btn svg { width: 16px; height: 16px; }
.icon-btn:hover { background: var(--sb-bg-hover); color: var(--sb-text-bright); }
.icon-btn:disabled { opacity: .3; cursor: default; }
.icon-btn:disabled:hover { background: none; }

.cms-header__responsive { display: flex; background: var(--sb-bg-light); border: 1px solid var(--sb-border); border-radius: 9px; padding: 2px; }
.cms-header__responsive button { border: none; background: none; padding: 5px 11px; border-radius: 7px; color: var(--sb-text-muted); display: inline-flex; align-items: center; }
.cms-header__responsive button svg { width: 15px; height: 15px; }
.cms-header__responsive button.active { background: #fff; color: var(--sb-accent); box-shadow: 0 1px 3px rgba(15,23,42,.14); }

.preview-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; border-radius: 7px; padding: 6px 11px; font-size: 12.5px; font-weight: 500; color: var(--sb-text); }
.preview-btn svg { width: 15px; height: 15px; }
.preview-btn:hover { background: var(--sb-bg-hover); }
.preview-btn.active { background: var(--sb-accent-bg); color: var(--sb-accent); }

.btn-publish { background: var(--sb-accent); color: #fff; border: none; border-radius: 8px; padding: 8px 20px; font-size: 13px; font-weight: 600; transition: filter .12s; }
.btn-publish:hover { filter: brightness(1.08); }

/* ---- 3-column body ---- */
.cms-body { display: flex; flex: 1; min-height: 0; }
.panel-left { width: 242px; min-width: 242px; background: #fff; border-right: 1px solid var(--sb-border); display: flex; flex-direction: column; position: relative; }
.panel-left__editing { padding: 11px 14px; border-bottom: 1px solid var(--sb-border); display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--sb-text-muted); }
.panel-left__editing b { color: var(--sb-text-bright); font-weight: 600; }
.panel-left__content-hd { padding: 12px 14px 6px; display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; font-weight: 600; color: var(--sb-text-bright); }
.panel-left__content-hd .icon-btn { width: 24px; height: 24px; font-size: 14px; color: var(--sb-text-muted); }
#secList { flex: 1; overflow-y: auto; padding: 4px 8px 8px; }
.nav-add-section { margin: 10px; padding: 9px; background: none; border: 1px dashed var(--inp-border); border-radius: 8px; color: var(--sb-text-muted); font-size: 12px; }
.nav-add-section:hover { border-color: var(--sb-accent); color: var(--sb-accent); background: var(--sb-accent-bg); }

.widget-popover { display: none; position: absolute; top: 78px; left: 10px; right: 10px; z-index: 250; background: #fff; border: 1px solid var(--sb-border); border-radius: 12px; box-shadow: 0 18px 44px rgba(15,23,42,.18); padding: 12px; }
.widget-popover.open { display: block; }
.widget-popover .widget-grid { grid-template-columns: 1fr 1fr 1fr; }

.panel-right { width: 282px; min-width: 282px; background: #fff; border-left: 1px solid var(--sb-border); display: flex; flex-direction: column; min-height: 0; }
.rtabs { display: flex; border-bottom: 1px solid var(--sb-border); }
.rtabs button { flex: 1; padding: 11px; background: none; border: none; border-bottom: 2px solid transparent; font-size: 12.5px; font-weight: 600; color: var(--sb-text-muted); }
.rtabs button:hover { color: var(--sb-text); }
.rtabs button.active { color: var(--sb-text-bright); border-bottom-color: var(--sb-accent); }
.rpane { flex: 1; overflow-y: auto; min-height: 0; }
#blocksInspector { padding: 14px; }
.rpane-empty { padding: 16px; }
#tab-settings { padding: 14px; }
.props-tabs { margin: -14px -14px 14px; background: var(--sb-bg-light); }
.props-tabs button.active { background: #fff; }

/* ---- Canvas ---- */
.cms-preview { flex: 1; background: var(--preview-bg); min-width: 0; display: flex; }
.cms-preview__frame-wrap { flex: 1; padding: 18px; height: auto; }
.cms-preview__frame { width: 100%; height: 100%; background: #fff; border: 1px solid var(--sb-border); border-radius: 10px; box-shadow: 0 8px 28px rgba(15,23,42,.08); }

/* ---- Bottom bar ---- */
.cms-bottom { display: flex; justify-content: space-between; align-items: center; background: #fff; border-top: 1px solid var(--sb-border); padding: 7px 14px; font-size: 12px; }
.cms-bottom__crumb { color: var(--sb-text-muted); }
.cms-bottom__status.saved { color: var(--green); }
.cms-bottom__status.dirty { color: var(--amber); }

/* ---- Light fixes for previously-dark components ---- */
.widget-search { background: var(--sb-bg-light); border: 1px solid var(--inp-border); color: var(--inp-text); }
.widget-card { background: var(--sb-bg-light); border: 1px solid var(--sb-border); color: var(--sb-text); }
.widget-card:hover { border-color: var(--sb-accent); color: var(--sb-accent); background: var(--sb-accent-bg); }
.nav-tree-item { color: var(--sb-text); }
.modal { background: #fff; color: var(--sb-text-bright); border: 1px solid var(--sb-border); }
.modal p, .modal label { color: var(--sb-text); }
.settings-group h4 { color: var(--sb-text-bright); }
.sidebar-panel, #blocksInspector, #secList, .page-data-panel, .rpane { scrollbar-color: #c9cdd8 transparent; }
.sidebar-panel::-webkit-scrollbar-thumb, #blocksInspector::-webkit-scrollbar-thumb, #secList::-webkit-scrollbar-thumb, .rpane::-webkit-scrollbar-thumb { background: #c9cdd8; border: 2px solid #fff; }
.rpane::-webkit-scrollbar { width: 9px; }
</style>
</head>
<body>

<!-- ========== APP SHELL ========== -->
<div class="cms-app">

  <!-- HEADER -->
  <header class="cms-header">
    <div class="cms-header__left">
      <div class="pages-crumb">

        <button type="button" data-view="tablet" title="Tablet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg></button>

let data = null;
let dirty = false;
let stylesData = { overrides: {} };
let stylesDirty = false;

const $ = (s, el) => (el || document).querySelector(s);
const statusEl = $('#status');
const saveBtn = $('#saveBtn');

const get = (path) => path.split('.').reduce((o, k) => (o == null ? undefined : o[k]), data);
function set(path, value) {
  const keys = path.split('.');
  const last = keys.pop();
  const target = keys.reduce((o, k) => (o[k] = o[k] || {}), data);
  target[last] = value;
  markDirty();
}

function markDirty() {
  dirty = true;
  saveBtn.disabled = false;
  statusEl.textContent = 'Unsaved changes';
  statusEl.className = 'status-dot dirty';
}

function toast(msg, isErr) {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(t._h);
  t._h = setTimeout(() => (t.className = 'toast'), 2600);
}

function textInput(value, onInput, isArea) {
  const el = document.createElement(isArea ? 'textarea' : 'input');
  if (!isArea) el.type = 'text';
  el.className = isArea ? 'ctl-textarea' : 'ctl-input';
  el.value = value == null ? '' : value;
  el.addEventListener('input', () => onInput(el.value));
  return el;
}

function pushStylesPreview() {
  const f = document.getElementById('themeFrame');
  try {
    f.contentWindow.postMessage({ type: 'ploy-styles-preview', overrides: stylesData.overrides }, window.WEBSITE_ORIGIN);
  } catch (e) {}
}
window.pushStylesPreview = pushStylesPreview;

function styleRow(key) {
  const box = document.createElement('div');
  box.className = 'stylerow';
  const cur = () => stylesData.overrides[key] || {};
  const setO = (patch) => {
    const next = Object.assign({}, stylesData.overrides[key] || {}, patch);
    Object.keys(next).forEach((k) => { if (next[k] === '' || next[k] === 0 || next[k] == null) delete next[k]; });
    if (Object.keys(next).length) stylesData.overrides[key] = next;
    else delete stylesData.overrides[key];
    stylesDirty = true;
    markDirty();
    pushStylesPreview();
  };
  const sel = document.createElement('select');
  [{ id: '', label: 'Default font' }].concat(window.PloyTheme ? window.PloyTheme.FONT_OPTIONS : []).forEach((f) => {
    const op = document.createElement('option');
    op.value = f.id;
    op.textContent = f.label;
    if ((cur().font || '') === f.id) op.selected = true;
    sel.append(op);
  });
  const custom = document.createElement('input');
  custom.type = 'text';
  custom.placeholder = 'e.g. "Roboto", sans-serif';
  custom.value = cur().fontCustom || '';
  custom.style.display = cur().font === 'custom' ? '' : 'none';
  sel.addEventListener('change', () => {
    custom.style.display = sel.value === 'custom' ? '' : 'none';
    setO({ font: sel.value });
  });
  custom.addEventListener('input', () => setO({ fontCustom: custom.value }));
  const size = document.createElement('input');
  size.type = 'number'; size.min = 8; size.max = 200;
  size.placeholder = 'Size px'; size.title = 'Font size in px';
  size.value = cur().size || '';
  size.addEventListener('input', () => setO({ size: parseFloat(size.value) || 0 }));
  const colRow = document.createElement('div');
  colRow.className = 'row'; colRow.style.marginBottom = '0';
  const sw = document.createElement('input'); sw.type = 'color'; sw.style.flex = 'none';
  sw.value = /^#[0-9a-fA-F]{6}$/.test(cur().color || '') ? cur().color : '#000000';
  const hx = document.createElement('input'); hx.type = 'text'; hx.placeholder = 'Color hex'; hx.value = cur().color || '';
  sw.addEventListener('input', () => { hx.value = sw.value; setO({ color: sw.value }); });
  hx.addEventListener('input', () => { if (/^#[0-9a-fA-F]{6}$/.test(hx.value)) sw.value = hx.value; setO({ color: hx.value }); });
  const clr = document.createElement('button'); clr.type = 'button'; clr.className = 'ctl-clear'; clr.textContent = '✕';
  clr.addEventListener('click', () => {
    delete stylesData.overrides[key]; stylesDirty = true; markDirty(); pushStylesPreview();
    sel.value = ''; custom.value = ''; custom.style.display = 'none'; size.value = ''; hx.value = '';
  });
  colRow.append(sw, hx, clr);
  const r1 = document.createElement('div'); r1.className = 'row'; r1.append(sel, size);
  box.append(r1, custom, colRow);
  return box;
}

function fieldWrap(labelText, control, styleKey) {
  const w = document.createElement('div');
  w.className = 'ctl-field';
  const l = document.createElement('label');
  l.textContent = labelText;
  w.append(l);
  if (styleKey) {
    const btn = document.createElement('button'); btn.type = 'button'; btn.className = 'aa-btn'; btn.textContent = 'Aa';
    if (stylesData.overrides[styleKey]) btn.classList.add('on');
    l.style.display = 'flex'; l.style.alignItems = 'center';
    l.append(btn);
    const row = styleRow(styleKey);
    row.style.display = stylesData.overrides[styleKey] ? '' : 'none';
    btn.addEventListener('click', () => {
      const show = row.style.display === 'none';
      row.style.display = show ? '' : 'none';
      btn.classList.toggle('on', show || !!stylesData.overrides[styleKey]);
    });
    w.append(row);
  }
  w.append(control);
  return w;
}

function imageControl(value, onChange) {
  const wrap = document.createElement('div');
  wrap.className = 'img-control';
  const img = document.createElement('img');
  img.className = 'img-control__thumb';
  img.src = value || '';
  img.onerror = () => { img.style.visibility = 'hidden'; };
  img.onload = () => { img.style.visibility = 'visible'; };
  const body = document.createElement('div');
  body.className = 'img-control__body';
  const input = textInput(value, (v) => { onChange(v); img.src = v; });
  const file = document.createElement('input'); file.type = 'file'; file.accept = '.webp,.png,.jpg,.jpeg,.gif,.svg'; file.style.display = 'none';
  const btn = document.createElement('button'); btn.className = 'img-control__upload'; btn.textContent = '📁 Upload…';
  btn.addEventListener('click', () => file.click());
  file.addEventListener('change', async () => {
    const f = file.files[0]; if (!f) return;
    btn.textContent = '⏳ Uploading…';
    try {
      const dataBase64 = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(f); });
      const resp = await fetch('/api/upload', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: f.name, dataBase64 }) });
      const out = await resp.json();
      if (!resp.ok) throw new Error(out.error || 'Upload failed');
      input.value = out.path; img.src = out.path; onChange(out.path);
      toast('Image uploaded: ' + out.path);
    } catch (e) { toast('Upload failed: ' + e.message, true); }
    btn.textContent = '📁 Upload…'; file.value = '';
  });
  body.append(input, btn, file);
  wrap.append(img, body);
  return wrap;
}

function renderItemFields(container, arr, idx, itemSchema, rerender, basePath) {
  itemSchema.forEach((f) => {
    let control, styleKey = null;
    if (f.type === 'image') {
      control = imageControl(arr[idx][f.key], (v) => { arr[idx][f.key] = v; markDirty(); });
    } else {
      control = textInput(arr[idx][f.key], (v) => { arr[idx][f.key] = v; markDirty(); }, f.type === 'textarea');
      if (basePath) styleKey = basePath + '.' + idx + '.' + f.key;
    }
    container.append(fieldWrap(f.label, control, styleKey));
  });
}

function listControl(field) {
  const outer = document.createElement('div');
  const arr = get(field.path) || [];
  function rerender() {
    outer.innerHTML = '';
    arr.forEach((item, idx) => {
      const card = document.createElement('div'); card.className = 'list-item';
      const tools = document.createElement('div'); tools.className = 'itemtools';
      const mk = (txt, title, fn, cls) => {
        const b = document.createElement('button'); b.textContent = txt; b.title = title; if (cls) b.className = cls;
        b.addEventListener('click', () => { fn(); markDirty(); rerender(); }); return b;
      };
      tools.append(
        mk('↑', 'Move up', () => { if (idx > 0) arr.splice(idx - 1, 0, arr.splice(idx, 1)[0]); }),
        mk('↓', 'Move down', () => { if (idx < arr.length - 1) arr.splice(idx + 1, 0, arr.splice(idx, 1)[0]); }),
        mk('✕', 'Remove', () => { if (confirm('Remove this ' + (field.itemLabel || 'item') + '?')) arr.splice(idx, 1); }, 'del'),
      );
      card.append(tools);
      renderItemFields(card, arr, idx, field.item, rerender, field.path);
      outer.append(card);
    });
    const add = document.createElement('button'); add.className = 'addbtn'; add.textContent = '+ Add ' + (field.itemLabel || 'item');
    add.addEventListener('click', () => {
      const blank = {}; field.item.forEach((f) => (blank[f.key] = ''));
      arr.push(blank); markDirty(); rerender();
    });
    outer.append(add);
  }
  rerender();
  return outer;
}

function buildEditor() {
  const editor = $('#editor');
  const toc = $('#toc');
  editor.innerHTML = ''; toc.innerHTML = '';
  SCHEMA.forEach((section) => {
    const panel = document.createElement('div'); panel.className = 'page-data-panel'; panel.id = 'sec-' + section.id;
    const h = document.createElement('h4'); h.textContent = section.title; panel.append(h);
    if (section.hint) { const p = document.createElement('p'); p.className = 'hint'; p.textContent = section.hint; panel.append(p); }
    section.fields.forEach((field) => {
      if (field.type === 'list') { panel.append(fieldWrap(field.label, listControl(field))); }
      else if (field.type === 'stringlist') { panel.append(fieldWrap(field.label, textInput((get(field.path) || []).join('\n'), (v) => { set(field.path, v.split('\n').map(s => s.trim()).filter(Boolean)); }, true))); }
      else if (field.type === 'image') { panel.append(fieldWrap(field.label, imageControl(get(field.path), (v) => set(field.path, v)))); }
      else { panel.append(fieldWrap(field.label, textInput(get(field.path), (v) => set(field.path, v), field.type === 'textarea'), field.path)); }
    });
    editor.append(panel);
    const link = document.createElement('a'); link.href = '#sec-' + section.id; link.textContent = section.title; toc.append(link);
  });
}

async function save() {
  if (!dirty) return;
  saveBtn.disabled = true; statusEl.textContent = 'Saving…';
  try {
    const resp = await fetch('/api/content', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    const out = await resp.json(); if (!resp.ok) throw new Error(out.error || 'Save failed');
    if (stylesDirty) {
      const r2 = await fetch('/api/styles', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(stylesData) });
      if (!r2.ok) throw new Error('Text styles save failed');
      stylesDirty = false;
    }
    dirty = false; statusEl.textContent = 'All saved'; statusEl.className = 'status-dot saved';
    toast('Saved. Reload any open site tab to see it.');
  } catch (e) {
    saveBtn.disabled = false; statusEl.textContent = 'Save failed'; statusEl.className = 'status-dot dirty';
    toast('Save failed: ' + e.message, true);
  }
}
saveBtn.addEventListener('click', save);
document.addEventListener('keydown', (e) => { if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); save(); } });
window.addEventListener('beforeunload', (e) => { if (dirty) e.preventDefault(); });

(async function init() {
  try {
    const [resp, stylesResp] = await Promise.all([
      fetch('/api/content', { cache: 'no-store' }),
      fetch('/api/styles', { cache: 'no-store' }),
    ]);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    data = await resp.json();
    if (stylesResp.ok) stylesData = await stylesResp.json();
    if (!stylesData.overrides) stylesData.overrides = {};
    buildEditor();
    statusEl.textContent = 'All saved'; statusEl.className = 'status-dot saved';
  } catch (e) {
    statusEl.textContent = 'Could not load content';
    toast('Run through server.js, not as a plain file.', true);
  }
})();
</script>

<!-- Theme / Appearance editor -->
<script>
(function () {
  const DEFAULT_THEME = {
    colors: { background: '#f4f1ec', surface: '#e9e6e0', ink: '#090706', onDark: '#ffffff', accent: '#89221c', bg: '#f5f1ea', headerBg: '#171412', footerBg: '#171412' },
    fonts: { headingPreset: 'playfair', headingCustom: '', bodyPreset: 'inter', bodyCustom: '' },
  };
  const HEX_RE = /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/;
  let theme = null;
  let themeDirty = false;
  const themeStatus = document.getElementById('themeStatus');
  const themeSaveBtn = document.getElementById('themeSaveBtn');
  const themeResetBtn = document.getElementById('themeResetBtn');
  const controls = document.getElementById('appearanceControls');
  const frame = document.getElementById('themeFrame');

  function markThemeDirty() {
    themeDirty = true; themeSaveBtn.disabled = false;
    themeStatus.textContent = 'Unsaved changes'; themeStatus.className = 'settings-status dirty';
  }
  function applyToPreview() {
    if (!theme) return;
    try { frame.contentWindow.postMessage({ type: 'ploy-theme-preview', theme: theme }, window.WEBSITE_ORIGIN); } catch (e) {}
  }
  function colorRow(label, key, hint) {
    const wrap = document.createElement('div'); wrap.className = 'colorfield';
    const l = document.createElement('label'); l.textContent = label;
    wrap.append(l);
    if (hint) { const p = document.createElement('p'); p.className = 'hint'; p.style.cssText = 'margin:0 0 6px;font-size:11px'; p.textContent = hint; wrap.append(p); }
    const row = document.createElement('div'); row.className = 'colorfield__row';
    const swatch = document.createElement('input'); swatch.type = 'color';
    swatch.value = HEX_RE.test(theme.colors[key] || '') ? theme.colors[key].slice(0, 7) : '#000000';
    const hex = document.createElement('input'); hex.type = 'text'; hex.value = theme.colors[key] || '';
    function commit(v) { theme.colors[key] = v; if (HEX_RE.test(v)) swatch.value = v; markThemeDirty(); applyToPreview(); }
    swatch.addEventListener('input', () => { hex.value = swatch.value; commit(swatch.value); });
    hex.addEventListener('input', () => commit(hex.value));
    row.append(swatch, hex);
    wrap.append(row);
    return wrap;
  }
  function fontRow(label, presetKey, customKey) {
    const wrap = document.createElement('div'); wrap.className = 'fontfield';
    const l = document.createElement('label'); l.textContent = label;
    const select = document.createElement('select');
    window.PloyTheme.FONT_OPTIONS.forEach((o) => {
      const opt = document.createElement('option'); opt.value = o.id; opt.textContent = o.label;
      if (theme.fonts[presetKey] === o.id) opt.selected = true; select.append(opt);
    });
    const custom = document.createElement('input'); custom.type = 'text'; custom.placeholder = 'e.g. "Roboto", sans-serif';
    custom.value = theme.fonts[customKey] || '';
    custom.style.display = theme.fonts[presetKey] === 'custom' ? '' : 'none';
    select.addEventListener('change', () => { theme.fonts[presetKey] = select.value; custom.style.display = select.value === 'custom' ? '' : 'none'; markThemeDirty(); applyToPreview(); });
    custom.addEventListener('input', () => { theme.fonts[customKey] = custom.value; markThemeDirty(); applyToPreview(); });
    wrap.append(l, select, custom);
    return wrap;
  }
  function buildAppearanceForm() {
    controls.innerHTML = '';
    controls.append(
      colorRow('Page background', 'background'),
      colorRow('Card & panel', 'surface'),
      colorRow('Ink (text)', 'ink'),
      colorRow('Text on dark', 'onDark'),
      colorRow('Accent', 'accent'),
      colorRow('Global BG', 'bg', 'Overall page background.'),
      colorRow('Header BG', 'headerBg'),
      colorRow('Footer BG', 'footerBg'),
      fontRow('Heading font', 'headingPreset', 'headingCustom'),
      fontRow('Body font', 'bodyPreset', 'bodyCustom'),
    );
  }
  frame.addEventListener('load', applyToPreview);
  themeResetBtn.addEventListener('click', () => { theme = JSON.parse(JSON.stringify(DEFAULT_THEME)); buildAppearanceForm(); markThemeDirty(); applyToPreview(); });
  async function saveTheme() {
    if (!themeDirty) return;
    const badColor = Object.entries(theme.colors).find(([, v]) => !HEX_RE.test(v || ''));
    if (badColor) { themeStatus.textContent = 'Fix invalid color'; themeStatus.className = 'settings-status dirty'; return; }
    themeSaveBtn.disabled = true; themeStatus.textContent = 'Saving…';
    try {
      const resp = await fetch('/api/theme', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(theme) });

<!-- Sections / Blocks editor -->
<script>
(function () {

  let pagesData = { pages: [] };

  let currentPagePath = '/';

    { v: 'p', l: 'Paragraph' }, { v: 'small', l: 'Small text' },

  let blocksData = null;
  let contentData = null;

  let contentDirty = false;

  let editMode = false;
  let knownDefaultSections = [];
  // When true, force the widget grid to stay visible even though a section
  // is selected — set by the in-preview "+ Add Widget" button so users can

  let showWidgetGrid = false;

  let multiSel = new Set();

  const statusEl = document.getElementById('blocksStatus');

  const pageBar = document.getElementById('pageBar');

  const uid = (p) => p + '_' + Math.random().toString(36).slice(2, 9);

  // Header and Footer are shared across every page: their widgets and
  // background/padding overrides live once in blocksData.global and every
  // page's default_section entry for them just points at that same object,
  // so editing either from any page updates it everywhere.
  const GLOBAL_KEYS = ['header', 'footer'];
  function isGlobalKey(key) { return GLOBAL_KEYS.indexOf(key) !== -1; }
  function globalEntry(key) {
    if (!blocksData.global) blocksData.global = {};
    if (!blocksData.global[key]) blocksData.global[key] = { blocks: [], override: {} };
    if (!blocksData.global[key].blocks) blocksData.global[key].blocks = [];
    if (!blocksData.global[key].override) blocksData.global[key].override = {};
    return blocksData.global[key];
  }

  function cur() {
    if (!blocksData.pages[currentPage]) blocksData.pages[currentPage] = { sections: [], defaultOverrides: {} };
    if (!blocksData.pages[currentPage].sections) blocksData.pages[currentPage].sections = [];
    if (!blocksData.pages[currentPage].defaultOverrides) blocksData.pages[currentPage].defaultOverrides = {};
    const page = blocksData.pages[currentPage];
    // Re-point header/footer entries at the shared global blocks/override
    // objects every time this page's data is accessed.
    page.sections.forEach((s) => {
      if (s.type === 'default_section' && isGlobalKey(s.key)) {
        const g = globalEntry(s.key);
        s.blocks = g.blocks;
        page.defaultOverrides[s.key] = g.override;
      }
    });
    return page;
  }
  const findSec = (id) => cur().sections.find((s) => s.id === id);
  // Recursive: finds a block by id anywhere in a section's tree (including
  // inside nested containers), so nested widgets resolve in the inspector.
  function findBlk(sec, id) {
    if (!sec || !id) return null;
    function walk(arr) {
      for (const b of (arr || [])) {
        if (b.id === id) return b;
        if (b.type === 'container' && b.blocks) { const hit = walk(b.blocks); if (hit) return hit; }
      }
      return null;
    }
    return walk(sec.blocks);
  }
  // Finds the container block that directly holds a given block id (or null
  // when the block sits at section top level).
  function findParentContainer(sec, id) {
    if (!sec) return null;
    function walk(arr, parent) {
      for (const b of (arr || [])) {
        if (b.id === id) return { found: true, parent };
        if (b.type === 'container' && b.blocks) {
          const r = walk(b.blocks, b);
          if (r.found) return r;
        }
      }
      return { found: false, parent: null };
    }
    const r = walk(sec.blocks, null);
    return r.found ? r.parent : null;
  }

  function markBlocksDirty() {
    blocksDirty = true; saveBtn.disabled = false;
    statusEl.textContent = 'Unsaved changes'; statusEl.className = 'cms-bottom__status dirty';
    snapshotHistory();
  }
  function markContentDirty() {
    contentDirty = true; saveBtn.disabled = false;
    statusEl.textContent = 'Unsaved changes'; statusEl.className = 'cms-bottom__status dirty';
  }

  // ---- UNDO / REDO (debounced blocksData snapshots) ----
  let history = [], histIdx = -1, histTimer = null, restoringHistory = false;
  function snapshotHistory() {
    if (restoringHistory || !blocksData) return;
    clearTimeout(histTimer);
    histTimer = setTimeout(() => {
      history = history.slice(0, histIdx + 1);

  }
  function seedHistory() {
    history = [JSON.stringify(blocksData)]; histIdx = 0; updateUndoButtons();
  }
  function restoreHistory(idx) {
    if (idx < 0 || idx >= history.length || idx === histIdx) return;
    histIdx = idx;
    restoringHistory = true;
    blocksData = JSON.parse(history[idx]);

  // ---- PUBLISH (one button orchestrates every pending save) ----

  setInterval(() => {

  // ---- site.json (content) path helpers, for repeatable list editing ----
  function getContentPath(path) {
    if (!contentData) return undefined;

  }
  function setContentPath(path, value) {
    const parts = path.split('.');
    let o = contentData;
    for (let i = 0; i < parts.length - 1; i++) { if (o[parts[i]] == null) o[parts[i]] = {}; o = o[parts[i]]; }

  }
  function pushContentPreview() {
    try { frame.contentWindow.postMessage({ type: 'ploy-content-preview', content: contentData }, ORIGIN); } catch (e) {}
  }
  function addListItem(lst) {
    let arr = getContentPath(lst.path);

    } else {

    }
    markContentDirty(); pushContentPreview(); renderInspector();
    toast('Added an item — edit it directly in the preview.');
  }
  function removeListItem(lst) {
    const arr = getContentPath(lst.path);
    if (!Array.isArray(arr) || !arr.length) { toast('Nothing to remove.', true); return; }
    arr.pop();
    markContentDirty(); pushContentPreview(); renderInspector();
  }

  function push() {
    if (!blocksData) return;
    try {
      frame.contentWindow.postMessage({
        type: 'ploy-blocks-preview', sections: cur().sections,
        editMode, selected, defaultOverrides: cur().defaultOverrides || {},
        multi: Array.from(multiSel),
      }, ORIGIN);
    } catch (e) {}
  }

  function newTextBlock(tag) {
    return { id: uid('b'), type: 'text', tag: tag || 'p', text: 'New text — click to edit.', font: '', fontCustom: '', size: 0, color: '', bold: false, align: 'left', width: 100 };
  }
  function newImageBlock() { return { id: uid('b'), type: 'image', src: '', alt: '', width: 48, radius: 0 }; }
  function newContainerBlock() { return { id: uid('b'), type: 'container', width: 100, flexDirection: 'column', gap: 16, alignItems: 'stretch', justifyContent: 'flex-start', padding: 0, bg: '', radius: 0, blocks: [newTextBlock()] }; }
  function newButtonBlock() { return { id: uid('b'), type: 'button', text: 'Button', url: '#', width: 100 }; }
  function newSection() {

    return { id: uid('s'), bg: '', paddingY: 40, gap: 24, maxWidth: 1152, minHeight: 420, align: 'start', layout: 'free', blocks: [t] };
  }
  // Give a new widget a sensible starting position when it lands in a
  // free-form section/container so it's visible and draggable.
  function placeFree(blk, targetBlocks) {
    const n = targetBlocks ? targetBlocks.length : 0;

  // ---- EDIT MODE / PREVIEW TOGGLE ----

  const previewToggleBtn = document.getElementById('previewToggleBtn');
  previewToggleBtn.addEventListener('click', () => {

  document.addEventListener('click', (e) => {

    }

  // ---- PAGE BAR ----
  function setPageLabels(label) {

  function buildPageBar() {

      const b = document.createElement('button'); b.type = 'button'; b.className = 'page-pill';
      b.textContent = pg.label; b.dataset.page = pg.path; b.dataset.slug = pg.slug;

  function showAddPageModal() {

    `;

    const titleInput = modal.querySelector('#newPageTitle');
    const cancelBtn = modal.querySelector('.modal-cancel');
    const confirmBtn = modal.querySelector('.modal-confirm');

    confirmBtn.addEventListener('click', async () => {
      const title = titleInput.value.trim(); if (!title) { titleInput.focus(); return; }
      confirmBtn.disabled = true; confirmBtn.textContent = 'Creating…';
      try {
        const resp = await fetch('/api/pages', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title }) });
        const out = await resp.json(); if (!resp.ok) throw new Error(out.error || 'Failed');

  }

  function loadInitialFrame() { frame.src = ORIGIN + currentPagePath; }

  // ---- MESSAGES FROM PREVIEW ----
  window.addEventListener('message', (ev) => {
    if (ev.origin !== ORIGIN) return;

          cur().migrated = true;

        obj = obj[parts[i]];
      }
      const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
      const modal = document.createElement('div'); modal.className = 'modal';

      let tempVal = d.current;
      const imgWrap = field('Image', imageControl(tempVal, (v) => { tempVal = v; }));
      modal.append(imgWrap);
      
      const acts = document.createElement('div'); acts.className = 'modal-actions';
      const cancelBtn = document.createElement('button'); cancelBtn.className = 'modal-cancel'; cancelBtn.textContent = 'Cancel';
      const confirmBtn = document.createElement('button'); confirmBtn.className = 'modal-confirm'; confirmBtn.textContent = 'Save';
      acts.append(cancelBtn, confirmBtn);

    } else if (d.type === 'ploy-blocks-select') {

    } else if (d.type === 'ploy-blocks-resize') {
      const blk = findBlk(findSec(d.sectionId), d.blockId); if (!blk) return;
      blk.width = d.width; markBlocksDirty();
      const wi = inspector.querySelector('[data-role=blockwidth]'); if (wi && document.activeElement !== wi) wi.value = Math.round(d.width);
    } else if (d.type === 'ploy-blocks-section-resize') {
      const sec = findSec(d.sectionId); if (!sec) return;
      sec.minHeight = d.minHeight; markBlocksDirty();
      const mh = inspector.querySelector('[data-role=secminh]'); if (mh && document.activeElement !== mh) mh.value = d.minHeight;
    } else if (d.type === 'ploy-blocks-free-move') {
      const blk = findBlk(findSec(d.sectionId), d.blockId); if (!blk) return;
      blk.x = d.x; blk.y = d.y; markBlocksDirty();
      const xi = inspector.querySelector('[data-role=freex]'); if (xi && document.activeElement !== xi) xi.value = d.x;
      const yi = inspector.querySelector('[data-role=freey]'); if (yi && document.activeElement !== yi) yi.value = d.y;
    } else if (d.type === 'ploy-blocks-free-resize') {
      const blk = findBlk(findSec(d.sectionId), d.blockId); if (!blk) return;
      blk.freeW = d.freeW; markBlocksDirty();
      const wi = inspector.querySelector('[data-role=freew]'); if (wi && document.activeElement !== wi) wi.value = d.freeW;
    } else if (d.type === 'ploy-blocks-multiselect') {
      // Shift/Ctrl-click on a widget in the canvas toggles it into the
      // multi-selection (scoped to one section).
      if (selected.s !== d.sectionId) { multiSel.clear(); }
      if (selected.b && selected.s === d.sectionId) multiSel.add(selected.b);
      if (multiSel.has(d.blockId)) multiSel.delete(d.blockId); else multiSel.add(d.blockId);
      selected = { s: d.sectionId, b: d.blockId };

    } else if (d.type === 'ploy-blocks-free-move-batch') {
      const sec = findSec(d.sectionId); if (!sec) return;
      (d.moves || []).forEach((m) => { const blk = findBlk(sec, m.id); if (blk) { blk.x = m.x; blk.y = m.y; } });
      markBlocksDirty();
    } else if (d.type === 'ploy-blocks-op') { handleOp(d); }
  });

  function handleOp(d) {
    const secs = cur().sections;
    const si = secs.findIndex((s) => s.id === d.sectionId); if (si === -1) return;
    const sec = secs[si];
    if (d.op === 'moveSection') { const ni = si + d.dir; if (ni < 0 || ni >= secs.length) return; secs.splice(ni, 0, secs.splice(si, 1)[0]); }
    else if (d.op === 'deleteSection') { if (!confirm('Delete this section?')) return; secs.splice(si, 1); selected = { s: null, b: null }; }
    else if (d.op === 'addBlock') {
      let blk;
      if (d.blockType === 'image') blk = newImageBlock();
      else if (d.blockType === 'button') blk = newButtonBlock();
      else if (d.blockType === 'container') blk = newContainerBlock();
      else blk = newTextBlock();
      sec.blocks = sec.blocks || [];
      if (sec.layout === 'free') placeFree(blk, sec.blocks);
      sec.blocks.push(blk);
      selected = { s: sec.id, b: blk.id };
    } else if (d.op === 'moveBlock' || d.op === 'deleteBlock') {
      // Locate the array that directly holds the block (top-level or nested
      // inside a container), so move/delete works at any depth.
      const loc = locateBlock(sec, d.blockId);
      if (!loc) return;
      const { arr, idx } = loc;
      if (d.op === 'moveBlock') { const nb = idx + d.dir; if (nb < 0 || nb >= arr.length) return; arr.splice(nb, 0, arr.splice(idx, 1)[0]); }
      else { arr.splice(idx, 1); if (selected.b === d.blockId) selected = { s: sec.id, b: null }; }
    }
    markBlocksDirty(); renderAll(); push();
  }

  // Returns { arr, idx } for the array (and index within it) that directly
  // contains blockId anywhere in the section tree, or null if not found.
  function locateBlock(sec, blockId) {
    function walk(arr) {
      for (let i = 0; i < arr.length; i++) {
        if (arr[i].id === blockId) return { arr, idx: i };
        if (arr[i].type === 'container' && arr[i].blocks) { const hit = walk(arr[i].blocks); if (hit) return hit; }
      }
      return null;
    }
    return walk(sec.blocks || []);
  }

  // Wrap the multi-selected sibling widgets into a new auto-layout container,
  // in place, preserving their order (Figma's "group"). Requires that every
  // selected widget shares the same parent array.
  function groupSelection() {
    const sec = findSec(selected.s);
    if (!sec) { multiSel.clear(); renderAll(); return; }
    const ids = Array.from(multiSel);
    const locs = ids.map((id) => ({ id, loc: locateBlock(sec, id) })).filter((x) => x.loc);
    if (locs.length < 2) { toast('Select at least two widgets in the same group to combine.', true); return; }
    const parentArr = locs[0].loc.arr;
    if (!locs.every((x) => x.loc.arr === parentArr)) { toast('Grouping needs widgets that share the same parent.', true); return; }
    // Order by current index, then extract (highest first so indices stay valid).
    locs.sort((a, b) => a.loc.idx - b.loc.idx);
    const insertAt = locs[0].loc.idx;
    const ordered = locs.map((x) => x.loc.arr[x.loc.idx]);
    locs.slice().sort((a, b) => b.loc.idx - a.loc.idx).forEach((x) => parentArr.splice(x.loc.idx, 1));
    const container = newContainerBlock();
    container.blocks = ordered;
    // If we're grouping on a free-form canvas (section or free container), the
    // new auto-layout frame takes the top-left corner of the selection so it
    // stays roughly where the widgets were.
    const parentC = findParentContainer(sec, ordered[0].id);
    const parentIsFree = parentC ? parentC.layout === 'free' : sec.layout === 'free';
    if (parentIsFree) {
      container.x = Math.min.apply(null, ordered.map((b) => b.x || 0));
      container.y = Math.min.apply(null, ordered.map((b) => b.y || 0));
    }
    parentArr.splice(insertAt, 0, container);
    multiSel.clear();
    selected = { s: sec.id, b: container.id };
    markBlocksDirty(); renderAll(); push();
    toast('Grouped ' + ordered.length + ' widgets into an auto-layout frame.');
  }

  // Dissolve a container, splicing its children back into the parent array at
  // the container's position (Figma's "ungroup").
  function ungroupContainer(sec, container) {
    const loc = locateBlock(sec, container.id);
    if (!loc) return;
    const kids = container.blocks || [];
    loc.arr.splice(loc.idx, 1, ...kids);
    selected = { s: sec.id, b: kids.length ? kids[0].id : null };
    markBlocksDirty(); renderAll(); push();
    toast('Ungrouped ' + kids.length + ' widgets.');
  }

  // ---- WIDGET ADD HANDLERS ----
  document.querySelectorAll('.widget-card').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.widget;
      if (type === 'section') {
        if (!blocksData) return;
        const s = newSection();
        cur().sections.push(s);
        selected = { s: s.id, b: s.blocks[0].id };
        showWidgetGrid = false;
        markBlocksDirty(); renderAll(); push();
        btn.classList.add('pulse');
        setTimeout(() => btn.classList.remove('pulse'), 600);
        return;
      }
      if (!selected.s) { toast('Select a section first to add widgets.', true); return; }
      const sec = findSec(selected.s);
      if (!sec) { toast('Select a section first to add widgets.', true); return; }
      let blk;
      if (type === 'heading') blk = newTextBlock('h2');
      else if (type === 'text') blk = newTextBlock('p');
      else if (type === 'image') blk = newImageBlock();
      else if (type === 'button') blk = newButtonBlock();
      else if (type === 'divider') blk = { id: uid('b'), type: 'divider', color: '#e5e7eb', height: 1, width: 100, lineStyle: 'solid' };
      else if (type === 'container') blk = newContainerBlock();
      else blk = newTextBlock();
      
      sec.blocks = sec.blocks || [];
      if (!selected.b) {
        sec.blocks.push(blk);
      } else {
        const selBlk = findBlk(sec, selected.b);
        if (selBlk && selBlk.type === 'container') {
          selBlk.blocks = selBlk.blocks || [];
          selBlk.blocks.push(blk);
        } else {
          // Find parent array and index to insert after
          let parentArr = sec.blocks;
          let idx = sec.blocks.findIndex(x => x.id === selected.b);
          if (idx === -1) {
            const findParent = (arr) => {
              for (let i = 0; i < arr.length; i++) {
                if (arr[i].type === 'container' && arr[i].blocks) {
                  const childIdx = arr[i].blocks.findIndex(x => x.id === selected.b);
                  if (childIdx !== -1) { parentArr = arr[i].blocks; idx = childIdx; return true; }
                  if (findParent(arr[i].blocks)) return true;
                }
              }
            };
            findParent(sec.blocks);
          }
          if (idx !== -1) {
            parentArr.splice(idx + 1, 0, blk);
          } else {
            sec.blocks.push(blk); // Fallback
          }
        }
      }
      
      // If the new widget landed in a free-form parent (or a default section,
      // whose extra widgets are a free-form overlay), give it a starting
      // position so it appears and can be dragged.
      const parentC = findParentContainer(sec, blk.id);
      const targetFree = parentC ? parentC.layout === 'free' : (sec.layout === 'free' || sec.type === 'default_section');
      if (targetFree) {
        placeFree(blk, parentC ? parentC.blocks : sec.blocks);
      }

      selected = { s: sec.id, b: blk.id };
      showWidgetGrid = false;
      markBlocksDirty(); renderAll(); push();
      btn.classList.add('pulse');
      setTimeout(() => btn.classList.remove('pulse'), 600);
    });
  });

  // ---- INSPECTOR HELPERS ----
  function field(label, control, role) {
    const w = document.createElement('div'); w.className = 'ctl-field';
    const l = document.createElement('label'); l.textContent = label;
    if (role) control.dataset.role = role;
    w.append(l, control); return w;
  }
  function numInput(val, onCh, min, max) {
    const i = document.createElement('input'); i.type = 'number'; i.className = 'ctl-input ctl-number';
    if (min != null) i.min = min; if (max != null) i.max = max;
    i.value = val != null ? val : '';
    i.addEventListener('input', () => onCh(parseFloat(i.value) || 0));
    return i;
  }
  function selInput(options, val, onCh) {
    const s = document.createElement('select'); s.className = 'ctl-select';
    options.forEach((o) => {
      const op = document.createElement('option'); op.value = o.v; op.textContent = o.l;
      if (o.v === val) op.selected = true; s.append(op);
    });
    s.addEventListener('change', () => onCh(s.value));
    return s;
  }
  function colorInput(val, onCh) {
    const row = document.createElement('div'); row.className = 'ctl-color-row';
    const sw = document.createElement('input'); sw.type = 'color';
    sw.value = /^#[0-9a-fA-F]{6}$/.test(val || '') ? val : '#ffffff';
    const hx = document.createElement('input'); hx.type = 'text'; hx.placeholder = 'empty = default'; hx.value = val || '';
    sw.addEventListener('input', () => { hx.value = sw.value; onCh(sw.value); });
    hx.addEventListener('input', () => { if (/^#[0-9a-fA-F]{6}$/.test(hx.value)) sw.value = hx.value; onCh(hx.value); });
    const clr = document.createElement('button'); clr.type = 'button'; clr.className = 'ctl-clear'; clr.textContent = '✕';
    clr.addEventListener('click', () => { hx.value = ''; onCh(''); });
    row.append(sw, hx, clr);
    return row;
  }
  function fontInputs(obj, onChange) {
    const wrap = document.createElement('div');
    const sel = selInput(
      [{ v: '', l: 'Default font' }].concat((window.PloyTheme ? window.PloyTheme.FONT_OPTIONS : []).map((f) => ({ v: f.id, l: f.label }))),
      obj.font || '', (v) => { obj.font = v; custom.style.display = v === 'custom' ? '' : 'none'; onChange(); },
    );
