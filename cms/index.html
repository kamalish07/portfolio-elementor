    custom.placeholder = 'e.g. "Roboto", sans-serif'; custom.style.marginTop = '6px';
    custom.value = obj.fontCustom || ''; custom.style.display = obj.font === 'custom' ? '' : 'none';
    custom.addEventListener('input', () => { obj.fontCustom = custom.value; onChange(); });
    wrap.append(sel, custom);
    return wrap;
  }
  function actionBtn(label, fn, isDanger) {
    const b = document.createElement('button'); b.type = 'button';
    b.textContent = label;
    if (isDanger) b.className = 'danger';
    b.addEventListener('click', fn);
    return b;
  }
  // Internal-link picker: a dropdown of the site's pages (from pages.json)
  // plus a free-text field for custom URLs and in-page anchors. Lets users
  // interlink pages without typing paths.
  function linkInput(value, onCh) {
    const wrap = document.createElement('div');
    const sel = document.createElement('select'); sel.className = 'ctl-select';
    const pages = (pagesData && pagesData.pages) ? pagesData.pages : [];
    const matched = pages.find((p) => p.path === value);
    const opts = [{ v: '__custom__', l: 'Custom URL / anchor…' }]
      .concat(pages.map((p) => ({ v: p.path, l: '📄 ' + p.label + '  (' + p.path + ')' })));
    opts.forEach((o) => {
      const op = document.createElement('option'); op.value = o.v; op.textContent = o.l;
      if ((matched && o.v === value) || (!matched && o.v === '__custom__')) op.selected = true;
      sel.append(op);
    });
    const txt = document.createElement('input'); txt.type = 'text'; txt.className = 'ctl-input';
    txt.placeholder = 'https://… , /work/page/ , or #section';
    txt.style.marginTop = '6px'; txt.value = value || '';
    txt.style.display = matched ? 'none' : '';
    sel.addEventListener('change', () => {
      if (sel.value === '__custom__') { txt.style.display = ''; txt.focus(); }
      else { txt.style.display = 'none'; txt.value = sel.value; onCh(sel.value); }
    });
    txt.addEventListener('input', () => onCh(txt.value));
    wrap.append(sel, txt);
    return wrap;
  }
  // Four-up per-side padding editor (Top / Right / Bottom / Left), Figma-style.
  function sidePadding(obj, onCh) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px';
    const sides = [['padTop', 'T'], ['padRight', 'R'], ['padBottom', 'B'], ['padLeft', 'L']];
    sides.forEach(([key, lbl]) => {
      const cell = document.createElement('div');
      const cap = document.createElement('div'); cap.textContent = lbl;
      cap.style.cssText = 'font-size:10px;color:var(--sb-text-muted);text-align:center;margin-bottom:2px';
      const i = document.createElement('input'); i.type = 'number'; i.className = 'ctl-input ctl-number';
      i.min = 0; i.max = 400; i.placeholder = '0';
      i.value = obj[key] != null ? obj[key] : '';
      i.addEventListener('input', () => {
        const v = i.value === '' ? null : (parseFloat(i.value) || 0);
        if (v == null) delete obj[key]; else obj[key] = v;
        onCh();
      });
      cell.append(cap, i); wrap.append(cell);
    });
    return wrap;
  }
  function checkboxRow(labelText, checked, onCh) {
    const wrap = document.createElement('div'); wrap.className = 'ctl-checkbox-row';
    const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = !!checked;
    const lb = document.createElement('span'); lb.textContent = labelText; lb.style.cssText = 'font-size:12px;color:var(--sb-text)';
    cb.addEventListener('change', () => onCh(cb.checked));
    wrap.append(cb, lb);
    return wrap;
  }
  // Border editor (width / style / color / radius) writing flat fields onto
  // the target object, shared by sections, widgets and default sections.
  function borderControls(obj, onCh) {
    const box = document.createElement('div');
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:6px;margin-bottom:6px';
    const w = document.createElement('input'); w.type = 'number'; w.min = 0; w.max = 40; w.placeholder = 'width';
    w.className = 'ctl-input ctl-number'; w.value = obj.borderWidth != null ? obj.borderWidth : '';
    w.title = 'Border width (px)';
    w.addEventListener('input', () => { const v = w.value === '' ? 0 : (parseFloat(w.value) || 0); obj.borderWidth = v; onCh(); });
    const st = selInput([{v:'solid',l:'Solid'},{v:'dashed',l:'Dashed'},{v:'dotted',l:'Dotted'},{v:'double',l:'Double'}], obj.borderStyle || 'solid', (v) => { obj.borderStyle = v; onCh(); });
    row.append(w, st);
    box.append(row);
    box.append(colorInput(obj.borderColor || '', (v) => { obj.borderColor = v; onCh(); }));
    const radLabel = document.createElement('div'); radLabel.textContent = 'Corner radius (px)';
    radLabel.style.cssText = 'font-size:10px;color:var(--sb-text-muted);margin:6px 0 2px';
    box.append(radLabel);
    box.append(numInput(obj.borderRadius != null ? obj.borderRadius : '', (v) => { obj.borderRadius = v; onCh(); }, 0, 200));
    return box;
  }
  // Figma-style 3x3 alignment grid for an auto-layout container. Cells map to
  // justifyContent (main axis) + alignItems (cross axis) based on direction.
  function alignGrid(blk, onCh) {
    const map = ['flex-start', 'center', 'flex-end'];
    const isRow = (blk.flexDirection || 'column') === 'row';
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:3px;width:90px';
    let activeR, activeC;
    if (isRow) { activeC = map.indexOf(blk.justifyContent || 'flex-start'); activeR = map.indexOf(blk.alignItems || 'stretch'); }
    else { activeR = map.indexOf(blk.justifyContent || 'flex-start'); activeC = map.indexOf(blk.alignItems || 'stretch'); }
    for (let r = 0; r < 3; r++) for (let c = 0; c < 3; c++) {
      const cell = document.createElement('button'); cell.type = 'button';
      const on = (r === activeR && c === activeC);
      cell.style.cssText = 'height:26px;border:1px solid var(--sb-border);background:' + (on ? 'var(--sb-accent)' : 'var(--sb-panel)') + ';border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0';
      const dot = document.createElement('span'); dot.style.cssText = 'width:5px;height:5px;border-radius:50%;background:' + (on ? '#fff' : 'var(--sb-text-muted)');
      cell.append(dot);
      cell.addEventListener('click', () => {
        if (isRow) { blk.justifyContent = map[c]; blk.alignItems = map[r]; }
        else { blk.justifyContent = map[r]; blk.alignItems = map[c]; }
        onCh(); renderInspector();
      });
      wrap.append(cell);
    }
    return wrap;
  }

  // ---- RENDER ----
  function renderAll() { renderList(); renderInspector(); updateWidgetPopover(); renderBottomCrumb(); }

  // Bottom-bar selection breadcrumb: Body › Section › Container › Widget
  function renderBottomCrumb() {
    const el = document.getElementById('selBreadcrumb');
    if (!el) return;
    const parts = ['Body'];
    const sec = selected.s ? findSec(selected.s) : null;
    if (sec) {
      if (sec.type === 'default_section') {
        const ds = knownDefaultSections.find((d) => d.id === sec.id);
        parts.push((ds && ds.label) || sec.key || 'Section');
      } else {
        parts.push('Section');
      }
      const blk = selected.b ? findBlk(sec, selected.b) : null;
      if (blk) {
        const chain = [];
        let p = findParentContainer(sec, blk.id);
        while (p) { chain.unshift('Container'); p = findParentContainer(sec, p.id); }
        parts.push(...chain);
        parts.push(blk.type.charAt(0).toUpperCase() + blk.type.slice(1));
      }
    }
    el.textContent = parts.join('  ›  ');
  }

  function renderList() {
    listEl.innerHTML = '';
    if (!blocksData) return;

    // Group + align action bar — shown when 2+ widgets are multi-selected.
    if (multiSel.size >= 2) {
      const box = document.createElement('div');
      box.style.cssText = 'padding:8px;margin-bottom:6px;background:var(--sb-accent);border-radius:6px;display:flex;flex-direction:column;gap:6px';
      const topRow = document.createElement('div');
      topRow.style.cssText = 'display:flex;gap:6px;align-items:center';
      const lbl = document.createElement('span');
      lbl.textContent = multiSel.size + ' selected'; lbl.style.cssText = 'font-size:11px;color:#fff;font-weight:600;flex:1';
      const gBtn = document.createElement('button'); gBtn.type = 'button'; gBtn.textContent = '📦 Group';
      gBtn.style.cssText = 'background:#fff;color:#111;border:none;border-radius:4px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer';
      gBtn.addEventListener('click', groupSelection);
      const xBtn = document.createElement('button'); xBtn.type = 'button'; xBtn.textContent = '✕';
      xBtn.style.cssText = 'background:transparent;color:#fff;border:none;cursor:pointer;font-size:12px';
      xBtn.addEventListener('click', () => { multiSel.clear(); renderAll(); push(); });
      topRow.append(lbl, gBtn, xBtn);
      // Alignment row (posts to the preview which measures + repositions).
      const alignRow = document.createElement('div');
      alignRow.style.cssText = 'display:flex;gap:3px;flex-wrap:wrap';
      const secId = selected.s;
      const aBtn = (label, mode, title) => {
        const b = document.createElement('button'); b.type = 'button'; b.textContent = label; b.title = title;
        b.style.cssText = 'background:rgba(255,255,255,.9);color:#111;border:none;border-radius:4px;padding:3px 7px;font-size:12px;cursor:pointer;line-height:1';
        b.addEventListener('click', () => {
          try { frame.contentWindow.postMessage({ type: 'ploy-multi-align', sectionId: secId, ids: Array.from(multiSel), mode }, ORIGIN); } catch (e) {}
        });
        return b;
      };
      alignRow.append(
        aBtn('⇤', 'left', 'Align left'), aBtn('⇔', 'hcenter', 'Align horizontal centers'), aBtn('⇥', 'right', 'Align right'),
        aBtn('⤒', 'top', 'Align top'), aBtn('↕', 'vcenter', 'Align vertical centers'), aBtn('⤓', 'bottom', 'Align bottom'),
        aBtn('↔', 'hdist', 'Distribute horizontally'), aBtn('↨', 'vdist', 'Distribute vertically')
      );
      box.append(topRow, alignRow);
      listEl.append(box);
    }

    const activeSecs = cur().sections;
    const allSecs = [...activeSecs];
    
    // Append any known default sections that are NOT in activeSecs
    knownDefaultSections.forEach(dInfo => {
      if (!activeSecs.find(s => s.id === dInfo.id)) {
        allSecs.push({ id: dInfo.id, type: 'default_section', key: dInfo.key, _hidden: true });
      }
    });

    let dragNode = null;
    let dragType = null; // 'section' or 'block'
    let dragSecId = null;
    let dragBlkId = null;

    allSecs.forEach((sec, i) => {
      const group = document.createElement('div'); group.className = 'nav-tree-section';
      if (sec._hidden) group.style.opacity = '0.5';
      const b = document.createElement('button'); b.type = 'button'; b.className = 'nav-tree-item';
      
      if (!sec._hidden) {
        group.draggable = true;
        group.addEventListener('dragstart', (e) => {
          dragNode = group; dragType = 'section'; dragSecId = sec.id;
          e.dataTransfer.effectAllowed = 'move';
          group.style.opacity = '0.4';
        });
        group.addEventListener('dragend', () => {
          group.style.opacity = '';
          listEl.querySelectorAll('.nav-tree-section').forEach(el => {
            el.style.borderTop = ''; el.style.borderBottom = '';
          });
        });
        group.addEventListener('dragover', (e) => {
          if (dragType !== 'section' || dragNode === group) return;
          e.preventDefault();
          const rect = group.getBoundingClientRect();
          if (e.clientY < rect.top + rect.height / 2) {
            group.style.borderTop = '2px solid var(--sb-accent)'; group.style.borderBottom = '';
          } else {
            group.style.borderBottom = '2px solid var(--sb-accent)'; group.style.borderTop = '';
          }
        });
        group.addEventListener('dragleave', () => {
          group.style.borderTop = ''; group.style.borderBottom = '';
        });
        group.addEventListener('drop', (e) => {
          e.preventDefault();
          group.style.borderTop = ''; group.style.borderBottom = '';
          if (dragType !== 'section' || dragNode === group) return;
          const rect = group.getBoundingClientRect();
          const dir = e.clientY < rect.top + rect.height / 2 ? 0 : 1;
          
          const secs = cur().sections;
          const fromIdx = secs.findIndex(s => s.id === dragSecId);
          let toIdx = secs.findIndex(s => s.id === sec.id);
          if (fromIdx === -1 || toIdx === -1) return;
          
          if (toIdx > fromIdx) toIdx--; // Adjust if moving down
          toIdx += dir;
          
          secs.splice(toIdx, 0, secs.splice(fromIdx, 1)[0]);
          markBlocksDirty(); renderAll(); push();
        });
      }
      
      const eyeBtn = document.createElement('button');
      eyeBtn.type = 'button';
      eyeBtn.innerHTML = sec._hidden ? '👁️‍🗨️' : '👁️';
      eyeBtn.style.cssText = 'background:none;border:none;margin-right:8px;cursor:pointer;';
      eyeBtn.onclick = (e) => {
        e.stopPropagation();
        if (sec._hidden) {
          // Re-add to active sections
          cur().sections.push({ id: sec.id, type: 'default_section', key: sec.key });
        } else {
          // Remove from active sections
          const idx = cur().sections.findIndex(s => s.id === sec.id);
          if (idx !== -1) cur().sections.splice(idx, 1);
        }
        markBlocksDirty(); renderAll(); push();
      };
      
      if (sec.type === 'default_section') {
        const dInfo = knownDefaultSections.find(x => x.id === sec.id);
        b.innerHTML = '<span class="nav-tree-item__icon">📌</span><span class="nav-tree-item__label">' + (dInfo ? dInfo.label : sec.key || 'Default') + '</span><span class="nav-tree-item__badge">built-in</span>';
        b.prepend(eyeBtn);
        b.classList.add('default');
        if (!sec._hidden) {
          if (selected.s === sec.id && !selected.b) b.classList.add('active');
          b.addEventListener('click', () => {
            selected = { s: sec.id, b: null }; showWidgetGrid = false; renderAll(); push();
            try { frame.contentWindow.postMessage({ type: 'ploy-scroll-to-section', sectionKey: sec.key }, ORIGIN); } catch (e) {}
          });
        }
      } else {
        const blkCount = (sec.blocks || []).length;
        b.innerHTML = '<span class="nav-tree-item__icon">▦</span><span class="nav-tree-item__label">Section ' + (i + 1) + '</span><span class="nav-tree-item__badge">' + blkCount + '</span>';
        b.prepend(eyeBtn);
        if (selected.s === sec.id && !selected.b) b.classList.add('active');
        b.addEventListener('click', () => { selected = { s: sec.id, b: null }; showWidgetGrid = false; renderAll(); push(); });
      }
      group.append(b);

      // Block children
      const renderTreeBlocks = (blocksArr, parentDiv, secId) => {
        blocksArr.forEach(blk => {
          const bb = document.createElement('button'); bb.type = 'button'; bb.className = 'nav-tree-item';
          const icon = blk.type === 'image' ? '🖼' : (blk.type === 'button' ? '🔘' : (blk.type === 'container' ? '📦' : (blk.type === 'divider' ? '➖' : 'T')));
          const label = blk.type === 'text' ? (blk.text || '').substring(0, 25).replace(/<[^>]+>/g, '') : blk.type.charAt(0).toUpperCase() + blk.type.slice(1);
          bb.innerHTML = '<span class="nav-tree-item__icon">' + icon + '</span><span class="nav-tree-item__label">' + (label || blk.type) + '</span>';
          if (selected.s === secId && selected.b === blk.id) bb.classList.add('active');
          if (multiSel.has(blk.id)) { bb.classList.add('active'); bb.style.boxShadow = 'inset 3px 0 0 var(--sb-accent)'; }
          bb.addEventListener('click', (e) => {
            e.stopPropagation();
            if (e.ctrlKey || e.metaKey || e.shiftKey) {
              // Toggle into the multi-selection (scoped to this section).
              if (selected.s !== secId) multiSel.clear();
              if (selected.b && selected.s === secId) multiSel.add(selected.b);
              if (multiSel.has(blk.id)) multiSel.delete(blk.id); else multiSel.add(blk.id);
              selected = { s: secId, b: blk.id };
            } else {
              multiSel.clear();
              selected = { s: secId, b: blk.id };
            }
            showWidgetGrid = false; renderAll(); push();
          });
          
          bb.draggable = true;
          bb.addEventListener('dragstart', (e) => {
            e.stopPropagation();
            dragNode = bb; dragType = 'block'; dragSecId = secId; dragBlkId = blk.id;
            e.dataTransfer.effectAllowed = 'move';
            bb.style.opacity = '0.4';
          });
          bb.addEventListener('dragend', (e) => {
            e.stopPropagation(); bb.style.opacity = '';
            document.querySelectorAll('.nav-tree-item').forEach(el => { el.style.borderTop = ''; el.style.borderBottom = ''; });
          });
          bb.addEventListener('dragover', (e) => {
            if (dragType !== 'block' || dragSecId !== secId || dragNode === bb) return;
            e.preventDefault(); e.stopPropagation();
            const rect = bb.getBoundingClientRect();
            if (e.clientY < rect.top + rect.height / 2) { bb.style.borderTop = '2px solid var(--sb-accent)'; bb.style.borderBottom = ''; } 
            else { bb.style.borderBottom = '2px solid var(--sb-accent)'; bb.style.borderTop = ''; }
          });
          bb.addEventListener('dragleave', (e) => { e.stopPropagation(); bb.style.borderTop = ''; bb.style.borderBottom = ''; });
          bb.addEventListener('drop', (e) => {
            e.stopPropagation(); e.preventDefault(); bb.style.borderTop = ''; bb.style.borderBottom = '';
            if (dragType !== 'block' || dragSecId !== secId || dragNode === bb) return;
            const rect = bb.getBoundingClientRect();
            const dir = e.clientY < rect.top + rect.height / 2 ? 0 : 1;
            
            // Find the array that contains dragBlkId and remove it
            let srcArr = null, fromIdx = -1, draggedBlk = null;
            const findAndRemove = (arr) => {
              for (let j = 0; j < arr.length; j++) {
                if (arr[j].id === dragBlkId) { srcArr = arr; fromIdx = j; draggedBlk = arr.splice(j, 1)[0]; return true; }
                if (arr[j].type === 'container' && arr[j].blocks) { if (findAndRemove(arr[j].blocks)) return true; }
              }
            };
            findAndRemove(sec.blocks);
            if (!draggedBlk) return;
            
            // Insert into the array that contains blk.id
            const insertInto = (arr) => {
              for (let j = 0; j < arr.length; j++) {
                if (arr[j].id === blk.id) {
                  let toIdx = j + dir;
                  arr.splice(toIdx, 0, draggedBlk);
                  return true;
                }
                if (arr[j].type === 'container' && arr[j].blocks) { if (insertInto(arr[j].blocks)) return true; }
              }
            };
            insertInto(sec.blocks);
            
            markBlocksDirty(); renderAll(); push();
          });
          
          parentDiv.append(bb);
          
          if (blk.type === 'container' && blk.blocks && blk.blocks.length) {
            const nestedDiv = document.createElement('div');
            nestedDiv.className = 'nav-tree-blocks';
            nestedDiv.style.marginLeft = '12px';
            nestedDiv.style.borderLeft = '1px solid var(--sb-border)';
            renderTreeBlocks(blk.blocks, nestedDiv, secId);
            parentDiv.append(nestedDiv);
          }
        });
      };

      if (sec.blocks && sec.blocks.length && !sec._hidden) {
        const blocksDiv = document.createElement('div'); blocksDiv.className = 'nav-tree-blocks';
        renderTreeBlocks(sec.blocks, blocksDiv, sec.id);
        group.append(blocksDiv);
      }
      listEl.append(group);
    });
  }

  function buildBreadcrumb(sec, blk) {
    const bc = document.createElement('div'); bc.className = 'inspector-breadcrumb';
    bc.style.cssText = 'display:flex;flex-wrap:wrap;align-items:center;gap:5px;padding:6px 12px;font-size:11px;border-bottom:1px solid var(--sb-border)';
    const crumb = (label, onClick, active) => {
      const b = document.createElement('button'); b.type = 'button'; b.textContent = label;
      b.style.cssText = 'background:none;border:none;padding:0;font-size:11px;color:' + (active ? 'var(--sb-text)' : 'var(--sb-accent)') + ';font-weight:' + (active ? '600' : '400') + ';cursor:' + (onClick ? 'pointer' : 'default');
      if (onClick) b.addEventListener('click', onClick);
      return b;
    };
    const sep = () => { const s = document.createElement('span'); s.textContent = '›'; s.style.opacity = '.45'; return s; };
    const secLabel = sec.type === 'default_section'
      ? '📌 ' + ((knownDefaultSections.find((d) => d.id === sec.id) || {}).label || sec.key || 'Section')
      : '▦ Section';
    bc.append(crumb(secLabel, () => { selected = { s: sec.id, b: null }; showWidgetGrid = false; renderAll(); push(); }, !blk));
    if (blk) {
      const chain = [];
      let p = findParentContainer(sec, blk.id);
      while (p) { chain.unshift(p); p = findParentContainer(sec, p.id); }
      chain.forEach((c) => {
        bc.append(sep(), crumb('📦 Container', () => { selected = { s: sec.id, b: c.id }; showWidgetGrid = false; renderAll(); push(); }, false));
      });
      bc.append(sep(), crumb((blk.type.charAt(0).toUpperCase() + blk.type.slice(1)), null, true));
    }
    return bc;
  }

  function renderInspector() {
    inspector.innerHTML = '';
    const emptyMsg = document.getElementById('inspectorEmpty');
    if (!blocksData || !selected.s) {
      if (emptyMsg) emptyMsg.style.display = 'block';
      inspector.style.display = 'none'; return;
    }
    if (emptyMsg) emptyMsg.style.display = 'none';
    inspector.style.display = 'block';

    const sec = findSec(selected.s);
    if (!sec) { selected.s = null; renderInspector(); return; }
    const blk = findBlk(sec, selected.b);
    const upd = () => { markBlocksDirty(); push(); };
    const targetData = blk || sec;

    // Inspector header
    const hdr = document.createElement('div'); hdr.className = 'inspector-header';
    const backBtn = document.createElement('button'); backBtn.className = 'inspector-back'; backBtn.textContent = '←';
    backBtn.addEventListener('click', () => {
      if (blk) { selected = { s: sec.id, b: null }; }
      else { selected = { s: null, b: null }; }
      renderAll(); push();
    });
    const title = document.createElement('h3');
    hdr.append(backBtn, title);
    inspector.append(hdr);

    // Breadcrumb (Webflow-style): Section › Container › Widget, each clickable
    // to jump up the hierarchy. Shown whenever a widget is selected.
    if (blk) inspector.append(buildBreadcrumb(sec, blk));

    // Default Section (only when the section itself, not a widget inside it, is selected)
    if (sec.type === 'default_section' && !blk) {
      const sKey = selected.s.replace('default:', '');
      const ds = knownDefaultSections.find((d) => d.key === sKey);
      const ov = cur().defaultOverrides[sKey] || {};
      title.textContent = '📌 ' + (ds ? ds.label : 'Default Section');
      inspector.append(field('Background color', colorInput(ov.bg || '', (v) => {
        if (!cur().defaultOverrides[sKey]) cur().defaultOverrides[sKey] = {};
        cur().defaultOverrides[sKey].bg = v; if (!v) delete cur().defaultOverrides[sKey].bg; upd();
      })));
      inspector.append(field('Vertical padding (px)', numInput(ov.paddingY || '', (v) => {
        if (!cur().defaultOverrides[sKey]) cur().defaultOverrides[sKey] = {};
        cur().defaultOverrides[sKey].paddingY = v || 0; if (!v) delete cur().defaultOverrides[sKey].paddingY; upd();
      }, 0, 400)));
      if (!cur().defaultOverrides[sKey]) cur().defaultOverrides[sKey] = {};
      inspector.append(field('Border', borderControls(cur().defaultOverrides[sKey], upd)));

      // Repeatable list controls (e.g. add a new Experience / Capability card).
      const lists = (ds && ds.lists) || [];
      lists.forEach((lst) => {
        const arr = getContentPath(lst.path);
        const count = Array.isArray(arr) ? arr.length : 0;
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:6px;align-items:center';
        const addBtn = document.createElement('button'); addBtn.type = 'button'; addBtn.textContent = '＋ Add item';
        addBtn.className = 'ctl-btn';
        addBtn.style.cssText = 'flex:1;background:var(--sb-accent);color:#fff;border:none;border-radius:4px;padding:6px;font-size:12px;cursor:pointer';
        addBtn.addEventListener('click', () => addListItem(lst));
        const delBtn = document.createElement('button'); delBtn.type = 'button'; delBtn.textContent = '－ Remove last';
        delBtn.style.cssText = 'flex:1;background:var(--sb-panel);color:var(--sb-text);border:1px solid var(--sb-border);border-radius:4px;padding:6px;font-size:12px;cursor:pointer';
        delBtn.addEventListener('click', () => removeListItem(lst));
        row.append(addBtn, delBtn);
        const short = lst.path.split('.').pop();
        inspector.append(field('Items — ' + short + ' (' + count + ')', row));
      });

      // Entrance animation + hover effect apply to the whole default section.
      inspector.append(field('Entrance Animation', selInput([
        { v: '', l: 'None' }, { v: 'fade', l: 'Fade In' },
        { v: 'slide-up', l: 'Slide Up' }, { v: 'slide-left', l: 'Slide Left' },
        { v: 'slide-right', l: 'Slide Right' }, { v: 'zoom-in', l: 'Zoom In' },
        { v: 'bounce', l: 'Bounce' }, { v: 'flip', l: 'Flip' },
      ], sec.animation || '', (v) => { sec.animation = v; upd(); })));
      inspector.append(field('Animation duration (s)', numInput(sec.animDuration || 0.6, (v) => { sec.animDuration = v; upd(); }, 0.1, 5)));
      inspector.append(field('Hover Effect', selInput([
        { v: '', l: 'None' }, { v: 'grow', l: 'Grow' }, { v: 'shrink', l: 'Shrink' },
        { v: 'float', l: 'Float' }, { v: 'glow', l: 'Glow' }, { v: 'pulse', l: 'Pulse' },
      ], sec.hoverEffect || '', (v) => { sec.hoverEffect = v; upd(); })));

      const acts = document.createElement('div'); acts.className = 'inspector-actions';
      acts.append(
        actionBtn('👁️ Hide Section', () => handleOp({ op: 'deleteSection', sectionId: sec.id }), true),
      );
      inspector.append(acts);
      return;
    }

    title.textContent = blk ? (blk.type.charAt(0).toUpperCase() + blk.type.slice(1) + ' Widget') : 'Section';

    // Props tabs
    const tabsRow = document.createElement('div'); tabsRow.className = 'props-tabs';
    const btnC = document.createElement('button'); btnC.textContent = 'Content'; btnC.className = 'active';
    const btnS = document.createElement('button'); btnS.textContent = 'Style';
    const btnA = document.createElement('button'); btnA.textContent = 'Advanced';
    tabsRow.append(btnC, btnS, btnA);
    inspector.append(tabsRow);

    const panelC = document.createElement('div');
    const panelS = document.createElement('div'); panelS.style.display = 'none';
    const panelA = document.createElement('div'); panelA.style.display = 'none';
    inspector.append(panelC, panelS, panelA);

    const switchPropsTab = (t) => {
      propsTab = t;
      btnC.className = t === 'c' ? 'active' : '';
      btnS.className = t === 's' ? 'active' : '';
      btnA.className = t === 'a' ? 'active' : '';
      panelC.style.display = t === 'c' ? 'block' : 'none';
      panelS.style.display = t === 's' ? 'block' : 'none';
      panelA.style.display = t === 'a' ? 'block' : 'none';
    };
    btnC.addEventListener('click', () => switchPropsTab('c'));
    btnS.addEventListener('click', () => switchPropsTab('s'));
    btnA.addEventListener('click', () => switchPropsTab('a'));
    // Restore the previously-active sub-tab so it survives re-renders.
    switchPropsTab(propsTab);

    // Content Tab
    if (!blk) {
      panelC.innerHTML = '<p class="hint">Sections hold widgets. Add widgets from Elements tab or use the widget grid.</p>';
    } else {
      if (blk.type === 'image') {
        panelC.append(field('Image URL', imageControl(blk.src, (v) => { blk.src = v; upd(); })));
        panelC.append(field('Alt text', textInput(blk.alt, (v) => { blk.alt = v; upd(); })));
        panelC.append(field('Link to (page or URL)', linkInput(blk.url || '', (v) => { blk.url = v; upd(); })));
      } else if (blk.type === 'button') {
        panelC.append(field('Button text', textInput(blk.text, (v) => { blk.text = v; upd(); })));
        panelC.append(field('Link to (page or URL)', linkInput(blk.url || '', (v) => { blk.url = v; upd(); })));
      } else {
        const ta = textInput(blk.text, (v) => { blk.text = v; upd(); }, true);
        panelC.append(field('Text (use [Text](/url) for links)', ta, 'blocktext'));
      }
    }

    // Style Tab
    if (!blk) {
      panelS.append(field('Layout mode', selInput(
        [{ v: 'free', l: 'Free-form (drag anywhere)' }, { v: 'flow', l: 'Stacked (auto-wrap row)' }],
        sec.layout === 'free' ? 'free' : 'flow', (v) => { sec.layout = v === 'free' ? 'free' : 'flow'; upd(); renderInspector(); }
      )));
      panelS.append(field('Background color', colorInput(sec.bg, (v) => { sec.bg = v; upd(); })));
      panelS.append(field('Vertical padding (px)', numInput(sec.paddingY, (v) => { sec.paddingY = v; upd(); }, 0, 400)));
      panelS.append(field('Padding — per side (px, overrides above)', sidePadding(sec, upd)));
      if (sec.layout !== 'free') {
        panelS.append(field('Gap between blocks (px)', numInput(sec.gap, (v) => { sec.gap = v; upd(); }, 0, 120)));
        panelS.append(field('Block alignment', selInput(
          [{ v: 'start', l: 'Top' }, { v: 'center', l: 'Center' }, { v: 'end', l: 'Bottom' }, { v: 'stretch', l: 'Stretch' }],
          sec.align || 'start', (v) => { sec.align = v; upd(); }
        )));
      }
      panelS.append(field('Content max width (px)', numInput(sec.maxWidth, (v) => { sec.maxWidth = v || 1152; upd(); }, 320, 2400)));
      panelS.append(field(sec.layout === 'free' ? 'Canvas height (px)' : 'Min height (px)', numInput(sec.minHeight, (v) => { sec.minHeight = v; upd(); }, 0, 2000), 'secminh'));
      panelS.append(field('Border', borderControls(sec, upd)));
    } else {
      if (blk.type === 'image') {
        panelS.append(field('Corner radius (px)', numInput(blk.radius, (v) => { blk.radius = v; upd(); }, 0, 100)));
      } else if (blk.type === 'text') {
        panelS.append(field('Typography', selInput(TAG_OPTIONS, blk.tag || 'p', (v) => { blk.tag = v; upd(); })));
        panelS.append(field('Font Family', fontInputs(blk, upd)));
        panelS.append(field('Size (px, 0 = default)', numInput(blk.size, (v) => { blk.size = v; upd(); }, 0, 200)));
        panelS.append(field('Color', colorInput(blk.color, (v) => { blk.color = v; upd(); })));
        panelS.append(field('Alignment', selInput(
          [{ v: 'left', l: 'Left' }, { v: 'center', l: 'Center' }, { v: 'right', l: 'Right' }],
          blk.align || 'left', (v) => { blk.align = v; upd(); }
        )));
        const boldWrap = document.createElement('div'); boldWrap.className = 'ctl-checkbox-row';
        const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = !!blk.bold;
        const boldLabel = document.createElement('span'); boldLabel.textContent = 'Enable bold'; boldLabel.style.cssText = 'font-size:12px;color:var(--sb-text)';
        cb.addEventListener('change', () => { blk.bold = cb.checked; upd(); });
        boldWrap.append(cb, boldLabel);
        panelS.append(field('Bold', boldWrap));
      } else if (blk.type === 'divider') {
        panelS.append(field('Line color', colorInput(blk.color, (v) => { blk.color = v; upd(); })));
        panelS.append(field('Thickness (px)', numInput(blk.height, (v) => { blk.height = v; upd(); }, 1, 20)));
        panelS.append(field('Line style', selInput([{v:'solid',l:'Solid'},{v:'dashed',l:'Dashed'},{v:'dotted',l:'Dotted'}], blk.lineStyle || 'solid', (v) => { blk.lineStyle = v; upd(); })));
      } else if (blk.type === 'container') {
        panelS.append(field('Layout mode', selInput([{v:'auto',l:'Auto-layout (stack)'},{v:'free',l:'Free-form (absolute)'}], blk.layout === 'free' ? 'free' : 'auto', (v) => { blk.layout = v === 'free' ? 'free' : 'auto'; upd(); renderInspector(); })));
        if (blk.layout !== 'free') {
          panelS.append(field('Direction', selInput([{v:'column',l:'Column (Vertical)'},{v:'row',l:'Row (Horizontal)'}], blk.flexDirection || 'column', (v) => { blk.flexDirection = v; upd(); renderInspector(); })));
          panelS.append(field('Alignment', alignGrid(blk, upd)));
          panelS.append(field('Gap (px)', numInput(blk.gap, (v) => { blk.gap = v; upd(); }, 0, 100)));
          panelS.append(field('Align Items', selInput([{v:'flex-start',l:'Start'},{v:'center',l:'Center'},{v:'flex-end',l:'End'},{v:'stretch',l:'Stretch'}], blk.alignItems || 'stretch', (v) => { blk.alignItems = v; upd(); renderInspector(); })));
          panelS.append(field('Justify Content', selInput([{v:'flex-start',l:'Start'},{v:'center',l:'Center'},{v:'flex-end',l:'End'},{v:'space-between',l:'Space Between'}], blk.justifyContent || 'flex-start', (v) => { blk.justifyContent = v; upd(); renderInspector(); })));
          panelS.append(field('Wrap children', checkboxRow('Wrap onto multiple lines', blk.wrap, (v) => { blk.wrap = v; upd(); })));
        } else {
          panelS.append(field('Frame min height (px)', numInput(blk.minHeight, (v) => { blk.minHeight = v; upd(); }, 0, 2000)));
          const hint = document.createElement('p'); hint.className = 'hint';
          hint.textContent = 'Free-form: select a child widget to set its X / Y position.';
          panelS.append(hint);
        }
        panelS.append(field('Padding — per side (px)', sidePadding(blk, upd)));
        panelS.append(field('Background', colorInput(blk.bg, (v) => { blk.bg = v; upd(); })));
        panelS.append(field('Corner radius (px)', numInput(blk.radius, (v) => { blk.radius = v; upd(); }, 0, 100)));
      }
      // Free-form position controls — shown whenever the widget sits directly
      // on a free-form section canvas or inside a free-form container.
      const parent = findParentContainer(sec, blk.id);
      const inFree = parent ? parent.layout === 'free' : (sec.layout === 'free' || sec.type === 'default_section');
      if (inFree) {
        // Quick align relative to the frame/section (measured in the preview).
        const alignRow = document.createElement('div');
        alignRow.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap';
        const mk = (label, mode) => {
          const bn = document.createElement('button'); bn.type = 'button'; bn.textContent = label;
          bn.style.cssText = 'flex:1;min-width:70px;background:var(--sb-panel);border:1px solid var(--sb-border);border-radius:4px;padding:5px;font-size:11px;cursor:pointer;color:var(--sb-text)';
          bn.addEventListener('click', () => { try { frame.contentWindow.postMessage({ type: 'ploy-free-align', sectionId: sec.id, blockId: blk.id, mode }, ORIGIN); } catch (e) {} });
          return bn;
        };
        alignRow.append(mk('↔ Center H', 'centerH'), mk('↕ Center V', 'centerV'), mk('⊹ Center', 'center'));
        panelS.append(field('Align in section', alignRow));
        panelS.append(field('X position (px)', numInput(blk.x || 0, (v) => { blk.x = v; upd(); }, 0, 4000), 'freex'));
        panelS.append(field('Y position (px)', numInput(blk.y || 0, (v) => { blk.y = v; upd(); }, 0, 4000), 'freey'));
        panelS.append(field('Fixed width (px, 0 = auto)', numInput(blk.freeW || 0, (v) => { blk.freeW = v || 0; upd(); }, 0, 2000), 'freew'));
      } else {
        panelS.append(field('Width (%)', numInput(Math.round(blk.width), (v) => { blk.width = Math.min(100, Math.max(8, v || 100)); upd(); }, 8, 100), 'blockwidth'));
      }
      panelS.append(field('Border', borderControls(blk, upd)));
    }

    // Advanced Tab
    panelA.append(field('Entrance Animation', selInput([
      { v: '', l: 'None' }, { v: 'fade', l: 'Fade In' },
      { v: 'slide-up', l: 'Slide Up' }, { v: 'slide-left', l: 'Slide Left' },
      { v: 'slide-right', l: 'Slide Right' }, { v: 'zoom-in', l: 'Zoom In' },
      { v: 'bounce', l: 'Bounce' }, { v: 'flip', l: 'Flip' },
    ], targetData.animation || '', (v) => { targetData.animation = v; upd(); })));
    panelA.append(field('Duration (s)', numInput(targetData.animDuration || 0.6, (v) => { targetData.animDuration = v; upd(); }, 0.1, 5)));
    panelA.append(field('Delay (s)', numInput(targetData.animDelay || 0, (v) => { targetData.animDelay = v; upd(); }, 0, 5)));

    // Hover effect
    panelA.append(field('Hover Effect', selInput([
      { v: '', l: 'None' }, { v: 'grow', l: 'Grow' }, { v: 'shrink', l: 'Shrink' },
      { v: 'float', l: 'Float' }, { v: 'glow', l: 'Glow' }, { v: 'pulse', l: 'Pulse' },
    ], targetData.hoverEffect || '', (v) => { targetData.hoverEffect = v; upd(); })));

    // Actions
    const acts = document.createElement('div'); acts.className = 'inspector-actions';
    if (!blk) {
      acts.append(
        actionBtn('✕ Delete', () => handleOp({ op: 'deleteSection', sectionId: sec.id }), true),
      );
    } else {
      acts.append(
        actionBtn('⬆ Parent', () => { const p = findParentContainer(sec, blk.id); selected = { s: sec.id, b: p ? p.id : null }; renderAll(); push(); }),
      );
      if (blk.type === 'container') {
        acts.append(actionBtn('⤢ Ungroup', () => ungroupContainer(sec, blk)));
      }
      acts.append(
        actionBtn('✕ Delete', () => handleOp({ op: 'deleteBlock', sectionId: sec.id, blockId: blk.id }), true),
      );
    }
    inspector.append(acts);
  }

  // ---- SAVE ----
  saveBtn.onclick = async () => {
    if (!blocksDirty && !contentDirty) return;
    saveBtn.disabled = true;
    try {
      if (blocksDirty) {
        await fetch('/api/blocks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(blocksData) });
        blocksDirty = false;
      }
      if (contentDirty) {
        await fetch('/api/content', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(contentData) });
        contentDirty = false;
      }
      lastSavedAt = Date.now();
      statusEl.className = 'cms-bottom__status saved';
      statusEl.textContent = 'Last saved just now ✓';
    } catch(e) {
      statusEl.className = 'cms-bottom__status dirty';
      statusEl.textContent = 'Save failed';
      saveBtn.disabled = false;
    }
  };
  window.addEventListener('beforeunload', (e) => { if (blocksDirty || contentDirty) e.preventDefault(); });

  // ---- INIT ----
  (async function init() {
    try {
      const [blocksResp, pagesResp, contentResp] = await Promise.all([
        fetch('/api/blocks', { cache: 'no-store' }),
        fetch('/api/pages', { cache: 'no-store' }),
        fetch('/api/content', { cache: 'no-store' }),
      ]);
      blocksData = blocksResp.ok ? await blocksResp.json() : { pages: {} };
      if (pagesResp.ok) pagesData = await pagesResp.json();
      contentData = contentResp.ok ? await contentResp.json() : {};
    } catch (e) { blocksData = { pages: {} }; contentData = {}; }
    if (!blocksData.pages) blocksData.pages = {};
    if (!pagesData.pages || !pagesData.pages.length) {
      pagesData = {
        pages: [
          { slug: 'home', path: '/', label: 'Home', builtin: true },
          { slug: 'product-wireframes', path: '/work/product-wireframes/', label: 'Wireframes', builtin: true },
          { slug: 'product-decks', path: '/work/product-decks/', label: 'Decks', builtin: true },
          { slug: 'visual-systems', path: '/work/visual-systems/', label: 'Visual Systems', builtin: true },
        ]
      };
    }
    statusEl.textContent = 'All changes saved'; statusEl.className = 'cms-bottom__status saved';
    seedHistory();
    buildPageBar(); loadInitialFrame(); renderAll();
  })();
})();
</script>
</body>
</html>
