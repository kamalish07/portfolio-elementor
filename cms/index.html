<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS Studio — Canva/Figma Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  window.WEBSITE_ORIGIN = 'http://localhost:4173';
</script>
<style>
/* ======================================================
   ELEMENTOR-STYLE CMS — COMPLETE DESIGN SYSTEM
   ====================================================== */
:root {
  --sb-bg: #1e1e1e;
  --sb-bg-light: #272727;
  --sb-bg-hover: #333333;
  --sb-bg-active: #404040;
  --sb-border: #3a3a3a;
  --sb-text: #bfbfbf;
  --sb-text-bright: #e0e0e0;
  --sb-text-muted: #808080;
  --sb-accent: #93c5fd;
  --sb-accent-bg: rgba(147,197,253,0.12);
  --sb-danger: #f87171;
  --hdr-bg: #000000;
  --hdr-border: #2a2a2a;
  --preview-bg: #e5e7eb;
  --inp-bg: #2a2a2a;
  --inp-border: #3e3e3e;
  --inp-text: #e0e0e0;
  --inp-focus: #93c5fd;
  --green: #10b981;
  --green-dark: #059669;
  --amber: #f59e0b;
  --red: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-size: 13px;
  background: var(--sb-bg);
  color: var(--sb-text);
  overflow: hidden;
  height: 100vh;
}
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }

/* ---- MAIN LAYOUT ---- */
.cms-app { display: flex; flex-direction: column; height: 100vh; }
.cms-header { display: flex; align-items: center; height: 48px; background: var(--hdr-bg); border-bottom: 1px solid var(--hdr-border); padding: 0 12px; gap: 8px; flex-shrink: 0; z-index: 100; }
.cms-header__logo { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: #93c5fd; border-radius: 4px; color: #000; font-weight: 700; font-size: 14px; letter-spacing: 0.3px; border: none; transition: opacity 0.15s; }
.cms-header__logo:hover { opacity: 0.9; }
.cms-header__sep { width: 1px; height: 28px; background: var(--hdr-border); margin: 0 4px; }
.cms-header__responsive { display: flex; align-items: center; gap: 2px; margin-left: 8px; }
.cms-header__responsive button { width: 36px; height: 32px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: #666; border-radius: 4px; transition: all 0.15s; font-size: 16px; }
.cms-header__responsive button:hover { color: #999; background: rgba(255,255,255,0.06); }
.cms-header__responsive button.active { color: var(--sb-accent); background: var(--sb-accent-bg); }
.cms-header__spacer { flex: 1; }
.cms-header__pages { display: flex; align-items: center; gap: 6px; overflow-x: auto; max-width: 50vw; scrollbar-width: none; }
.cms-header__pages::-webkit-scrollbar { display: none; }
.page-pill { padding: 5px 14px; border-radius: 16px; font-size: 12px; font-weight: 500; white-space: nowrap; background: var(--sb-bg-light); border: 1px solid var(--sb-border); color: var(--sb-text); transition: all 0.15s; }
.page-pill:hover { background: var(--sb-bg-hover); color: var(--sb-text-bright); }
.page-pill.active { background: var(--sb-accent); color: #000; border-color: var(--sb-accent); font-weight: 600; }
.cms-header__actions { display: flex; align-items: center; gap: 8px; margin-left: 12px; }
.btn-publish { padding: 7px 20px; background: var(--green); color: #fff; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
.btn-publish:hover { background: var(--green-dark); }
.btn-publish:disabled { background: #374151; color: #6b7280; cursor: default; }

/* ---- BODY ---- */
.cms-body { display: flex; flex: 1; min-height: 0; }
.cms-sidebar { width: 320px; flex-shrink: 0; background: var(--sb-bg); border-right: 1px solid var(--sb-border); display: flex; flex-direction: column; transition: width 0.25s; z-index: 50; overflow: hidden; }
.cms-sidebar.collapsed { width: 0; border-right: none; }
.sidebar-tabs { display: flex; border-bottom: 1px solid var(--sb-border); flex-shrink: 0; }
.sidebar-tabs button { flex: 1; padding: 12px 4px 10px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--sb-text-muted); font-size: 10px; font-weight: 600; text-transform: uppercase; transition: all 0.15s; }
.sidebar-tabs button:hover { color: var(--sb-text); background: var(--sb-bg-light); }
.sidebar-tabs button.active { color: var(--sb-accent); border-bottom-color: var(--sb-accent); }
.sidebar-panel { flex: 1; overflow-y: auto; padding: 16px; scrollbar-width: thin; scrollbar-color: var(--sb-bg-active) transparent; }

/* ---- WIDGET GRID ---- */
.widget-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.widget-card { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 14px 6px; background: var(--sb-bg-light); border: 1px solid var(--sb-border); border-radius: 6px; color: var(--sb-text); font-size: 10px; font-weight: 500; transition: all 0.2s; }
.widget-card:hover { background: var(--sb-accent-bg); border-color: var(--sb-accent); color: var(--sb-accent); transform: translateY(-1px); }
.widget-card svg { width: 22px; height: 22px; opacity: 0.7; }
.widget-card:hover svg { opacity: 1; }
@keyframes widgetPulse { 0% { box-shadow: 0 0 0 0 rgba(147,197,253,0.4); } 70% { box-shadow: 0 0 0 8px rgba(147,197,253,0); } 100% { box-shadow: 0 0 0 0 rgba(147,197,253,0); } }
.widget-card.pulse { animation: widgetPulse 0.6s ease-out; }

/* ---- NAVIGATOR TREE ---- */
.nav-tree { display: flex; flex-direction: column; gap: 2px; }
.nav-tree-item { display: flex; align-items: center; gap: 6px; padding: 7px 10px; background: none; border: none; border-radius: 4px; color: var(--sb-text); font-size: 12px; text-align: left; width: 100%; transition: all 0.12s; }
.nav-tree-item:hover { background: var(--sb-bg-hover); }
.nav-tree-item.active { background: var(--sb-accent-bg); color: var(--sb-accent); }
.nav-tree-blocks { margin-left: 20px; display: flex; flex-direction: column; gap: 1px; }

/* ---- FORM CONTROLS ---- */
.ctl-field { margin-bottom: 14px; }
.ctl-field > label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--sb-text-muted); margin-bottom: 6px; }
.ctl-input, .ctl-textarea, .ctl-select { width: 100%; padding: 8px 10px; background: var(--inp-bg); border: 1px solid var(--inp-border); border-radius: 4px; color: var(--inp-text); font-size: 12px; outline: none; }
.ctl-input:focus, .ctl-select:focus { border-color: var(--inp-focus); }
.ctl-color-row { display: flex; gap: 6px; align-items: center; }
.ctl-color-row input[type="color"] { width: 36px; height: 32px; padding: 2px; border: 1px solid var(--inp-border); border-radius: 4px; background: var(--inp-bg); cursor: pointer; }
.ctl-color-row input[type="text"] { flex: 1; padding: 7px 9px; background: var(--inp-bg); border: 1px solid var(--inp-border); border-radius: 4px; color: var(--inp-text); font-family: monospace; outline: none; }
.ctl-row { display: flex; gap: 8px; margin-bottom: 14px; }
.ctl-row > div { flex: 1; }

/* ---- INSPECTOR ---- */
.inspector-header { display: flex; align-items: center; gap: 8px; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--sb-border); }
.inspector-back { width: 28px; height: 28px; background: var(--sb-bg-hover); border: none; border-radius: 4px; color: var(--sb-text); }
.props-tabs { display: flex; margin: -16px -16px 16px -16px; border-bottom: 1px solid var(--sb-border); background: rgba(0,0,0,0.2); }
.props-tabs button { flex: 1; padding: 10px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--sb-text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; }
.props-tabs button:hover { color: var(--sb-text); }
.props-tabs button.active { color: var(--sb-accent); border-bottom-color: var(--sb-accent); }
.inspector-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--sb-border); }
.inspector-actions button { padding: 5px 10px; background: var(--sb-bg-hover); border: 1px solid var(--sb-border); border-radius: 4px; color: var(--sb-text); font-size: 11px; }
.inspector-actions button.danger { color: var(--sb-danger); }

/* ---- PREVIEW AREA ---- */
.cms-preview { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--preview-bg); }
.cms-preview__frame-wrap { flex: 1; display: flex; justify-content: center; padding: 0; transition: padding 0.3s; }
.cms-preview__frame-wrap.tablet { padding: 16px; }
.cms-preview__frame-wrap.mobile { padding: 16px; }
.cms-preview__frame { width: 100%; height: 100%; border: none; background: #fff; transition: max-width 0.3s; }
.cms-preview__frame-wrap.tablet .cms-preview__frame { max-width: 768px; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.cms-preview__frame-wrap.mobile .cms-preview__frame { max-width: 375px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }

/* ---- BOTTOM BAR ---- */
.cms-bottom { display: flex; align-items: center; justify-content: space-between; height: 40px; padding: 0 16px; background: var(--hdr-bg); border-top: 1px solid var(--hdr-border); }
.cms-bottom__status { font-size: 11px; color: var(--sb-text-muted); }
.cms-bottom__status.dirty { color: var(--amber); }
.cms-bottom__status.saved { color: var(--green); }
.cms-bottom__btn { padding: 5px 16px; background: var(--green); color: #fff; border: none; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
.cms-bottom__btn:disabled { background: #374151; color: #6b7280; }
</style>
</head>
<body>

<div class="cms-app">
  <!-- HEADER -->
  <header class="cms-header">
    <button class="cms-header__logo" type="button" id="sidebarToggle">CMS</button>
    <div class="cms-header__sep"></div>
    <div class="cms-header__responsive">
      <button type="button" data-view="desktop" class="active" title="Desktop">🖥️</button>
      <button type="button" data-view="tablet" title="Tablet">📱</button>
      <button type="button" data-view="mobile" title="Mobile">📲</button>
    </div>
    <div class="cms-header__spacer"></div>
    <div class="cms-header__pages" id="pageBar"></div>
    <div class="cms-header__actions">
      <span class="status-dot" id="status">Loading…</span>
      <button class="btn-publish" id="saveBtn" disabled>Publish</button>
    </div>
  </header>

  <!-- BODY -->
  <div class="cms-body">
    <!-- LEFT SIDEBAR -->
    <aside class="cms-sidebar" id="sidebar">
      <div class="sidebar-tabs">
        <button id="tabElementsBtn" class="active" type="button">Elements</button>
        <button id="tabSectionsBtn" type="button">Navigator</button>
        <button id="tabSettingsBtn" type="button">Settings</button>
      </div>

      <!-- ELEMENTS PANEL -->
      <div id="tab-elements" class="sidebar-panel">
        <div id="defaultWidgets">
          <h3>Structure & Media</h3>
          <div class="widget-grid">
            <button class="widget-card" data-widget="section" type="button">Section</button>
            <button class="widget-card" data-widget="container" type="button">Container</button>
            <button class="widget-card" data-widget="heading" type="button">Heading</button>
            <button class="widget-card" data-widget="text" type="button">Text</button>
            <button class="widget-card" data-widget="image" type="button">Image</button>
            <button class="widget-card" data-widget="button" type="button">Button</button>
          </div>
          <h3>Shapes</h3>
          <div class="widget-grid">
            <button class="widget-card" data-widget="shape-rect" type="button">Rectangle</button>
            <button class="widget-card" data-widget="shape-circle" type="button">Circle</button>
            <button class="widget-card" data-widget="shape-polygon" type="button">Polygon</button>
            <button class="widget-card" data-widget="shape-line" type="button">Line</button>
          </div>
        </div>
        <div id="blocksInspector" style="display:none"></div>
      </div>

      <!-- NAVIGATOR PANEL -->
      <div id="tab-sections" class="sidebar-panel" style="display:none">
        <h3>Layer Tree</h3>
        <div id="secList" class="nav-tree"></div>
        <button class="cms-bottom__btn" id="navAddSection" type="button" style="width:100%;margin-top:16px;">+ Add Section</button>
      </div>

      <!-- SETTINGS PANEL -->
      <div id="tab-settings" class="sidebar-panel" style="display:none">
        <h3>Theme Colors</h3>
        <div id="appearanceControls"></div>
      </div>
    </aside>

    <!-- PREVIEW -->
    <main class="cms-preview">
      <div class="cms-preview__frame-wrap" id="previewWrap">
        <iframe id="themeFrame" class="cms-preview__frame" title="Live preview"></iframe>
      </div>
    </main>
  </div>

  <!-- BOTTOM BAR -->
  <footer class="cms-bottom">
    <span class="cms-bottom__status" id="blocksStatus">All changes saved</span>
    <button class="cms-bottom__btn" id="blocksSaveBtn" disabled type="button">UPDATE</button>
  </footer>
</div>

<script>
// UI Toggles
const wrap = document.getElementById('previewWrap');
const btns = document.querySelectorAll('.cms-header__responsive button');
btns.forEach(btn => {
  btn.addEventListener('click', () => {
    btns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    wrap.className = 'cms-preview__frame-wrap ' + (btn.dataset.view || '');
  });
});
document.getElementById('sidebarToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('collapsed');
});

// App State
const ORIGIN = window.WEBSITE_ORIGIN;
let pagesData = { pages: [] };
let currentPage = 'home';
let currentPagePath = '/';
let blocksData = { pages: {} };
let blocksDirty = false;
let selected = { s: null, b: null };
let editMode = true;

const frame = document.getElementById('themeFrame');
const inspector = document.getElementById('blocksInspector');

function uid(p) { return p + '_' + Math.random().toString(36).slice(2, 9); }
function cur() {
  if (!blocksData.pages[currentPage]) blocksData.pages[currentPage] = { sections: [] };
  return blocksData.pages[currentPage];
}
function findSec(id) { return cur().sections.find(s => s.id === id); }
function findBlkDeep(blocks, id) {
  if (!blocks) return null;
  for (let i = 0; i < blocks.length; i++) {
    if (blocks[i].id === id) return { block: blocks[i], parent: blocks, index: i };
    if (blocks[i].blocks) {
      const f = findBlkDeep(blocks[i].blocks, id);
      if (f) return f;
    }
  }
  return null;
}
function findBlk(sec, id) {
  if (!sec) return null;
  const f = findBlkDeep(sec.blocks, id);
  return f ? f.block : null;
}

function markBlocksDirty() {
  blocksDirty = true; document.getElementById('blocksSaveBtn').disabled = false;
  document.getElementById('blocksStatus').className = 'cms-bottom__status dirty';
  document.getElementById('blocksStatus').textContent = 'Unsaved changes';
}

function push() {
  try {
    frame.contentWindow.postMessage({
      type: 'ploy-blocks-preview',
      sections: cur().sections,
      editMode, selected
    }, ORIGIN);
  } catch(e) {}
}

window.addEventListener('message', ev => {
  if (ev.origin !== ORIGIN) return;
  const d = ev.data || {};
  if (d.type === 'ploy-blocks-ready') { 
    document.getElementById('status').textContent = 'Live';
    document.getElementById('status').style.color = '#10b981';
    push(); 
    renderAll(); 
  }
  else if (d.type === 'ploy-blocks-select') { selected = { s: d.sectionId, b: d.blockId }; renderAll(); }
  else if (d.type === 'ploy-blocks-text') {
    const blk = findBlk(findSec(d.sectionId), d.blockId);
    if (blk) { blk.text = d.text; markBlocksDirty(); }
  }
  else if (d.type === 'ploy-blocks-move') {
    const blk = findBlk(findSec(d.sectionId), d.blockId);
    if (blk) { blk.x = d.x; blk.y = d.y; markBlocksDirty(); renderInspector(); }
  }
});

// Inspector UI Helpers
function el(tag, cls, text) { const e = document.createElement(tag); if (cls) e.className = cls; if (text) e.textContent = text; return e; }
function field(label, ctrl) { const w = el('div', 'ctl-field'); w.append(el('label', '', label), ctrl); return w; }
function numInput(val, onCh) {
  const i = el('input', 'ctl-input'); i.type = 'number'; i.value = val != null ? val : '';
  i.addEventListener('input', () => onCh(i.value === '' ? null : parseFloat(i.value)));
  return i;
}
function txtInput(val, onCh) {
  const i = el('input', 'ctl-input'); i.type = 'text'; i.value = val || '';
  i.addEventListener('input', () => onCh(i.value));
  return i;
}
function selInput(opts, val, onCh) {
  const s = el('select', 'ctl-select');
  opts.forEach(o => { const op = el('option', '', o.l); op.value = o.v; if (o.v === val) op.selected = true; s.append(op); });
  s.addEventListener('change', () => onCh(s.value));
  return s;
}
function colorInput(val, onCh) {
  const w = el('div', 'ctl-color-row');
  const sw = el('input'); sw.type = 'color'; sw.value = /^#[0-9a-fA-F]{6}$/.test(val || '') ? val.slice(0,7) : '#000000';
  const hx = el('input'); hx.type = 'text'; hx.value = val || '';
  sw.addEventListener('input', () => { hx.value = sw.value; onCh(sw.value); });
  hx.addEventListener('input', () => { onCh(hx.value); });
  w.append(sw, hx); return w;
}

// Widget Handlers
document.querySelectorAll('.widget-card').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.widget;
    if (type === 'section') {
      const s = { id: uid('s'), type: 'section', layoutMode: 'auto', flexDirection: 'column', paddingY: 64, gap: 24, blocks: [] };
      cur().sections.push(s); selected = { s: s.id, b: null };
    } else {
      if (!selected.s) return alert('Select a section or container first!');
      const sec = findSec(selected.s);
      let targetList = sec.blocks;
      if (selected.b) {
        const f = findBlkDeep(sec.blocks, selected.b);
        if (f && f.block.type === 'container') targetList = f.block.blocks = f.block.blocks || [];
      }
      
      let b;
      if (type === 'container') b = { id: uid('b'), type: 'container', layoutMode: 'auto', flexDirection: 'column', padding: 16, gap: 16, blocks: [] };
      else if (type === 'heading') b = { id: uid('b'), type: 'text', tag: 'h2', text: 'New Heading', size: 32 };
      else if (type === 'text') b = { id: uid('b'), type: 'text', tag: 'p', text: 'New Text Block', size: 16 };
      else if (type === 'image') b = { id: uid('b'), type: 'image', src: 'https://via.placeholder.com/400x300', width: 100 };
      else if (type === 'button') b = { id: uid('b'), type: 'button', text: 'Button', url: '#' };
      else if (type.startsWith('shape-')) b = { id: uid('b'), type: 'shape', shapeType: type.split('-')[1], width: 100, height: 100, bg: '#93c5fd' };
      
      if (b) { targetList.push(b); selected = { s: sec.id, b: b.id }; }
    }
    markBlocksDirty(); push(); renderAll();
  });
});

// Render Inspector
function renderInspector() {
  inspector.innerHTML = '';
  document.getElementById('defaultWidgets').style.display = selected.s ? 'none' : 'block';
  if (!selected.s) return inspector.style.display = 'none';
  
  inspector.style.display = 'block';
  const sec = findSec(selected.s);
  if (!sec) { selected.s = null; return renderInspector(); }
  const blk = findBlk(sec, selected.b);
  const tgt = blk || sec;
  const upd = () => { markBlocksDirty(); push(); };

  // Header
  const hdr = el('div', 'inspector-header');
  const bk = el('button', 'inspector-back', '←');
  bk.onclick = () => { if (blk) selected.b = null; else selected.s = null; renderAll(); push(); };
  hdr.append(bk, el('h3', '', blk ? blk.type.toUpperCase() : 'SECTION'));
  inspector.append(hdr);

  // Tabs
  const tabs = el('div', 'props-tabs');
  const tbC = el('button', 'active', 'Content');
  const tbL = el('button', '', 'Layout');
  const tbS = el('button', '', 'Style');
  const tbE = el('button', '', 'Effects');
  tabs.append(tbC, tbL, tbS, tbE);
  inspector.append(tabs);

  const pC = el('div'); const pL = el('div'); const pS = el('div'); const pE = el('div');
  pL.style.display = pS.style.display = pE.style.display = 'none';
  inspector.append(pC, pL, pS, pE);

  const switchTab = (t) => {
    tbC.className = t === 'c' ? 'active' : ''; pC.style.display = t === 'c' ? 'block' : 'none';
    tbL.className = t === 'l' ? 'active' : ''; pL.style.display = t === 'l' ? 'block' : 'none';
    tbS.className = t === 's' ? 'active' : ''; pS.style.display = t === 's' ? 'block' : 'none';
    tbE.className = t === 'e' ? 'active' : ''; pE.style.display = t === 'e' ? 'block' : 'none';
  };
  tbC.onclick = () => switchTab('c'); tbL.onclick = () => switchTab('l');
  tbS.onclick = () => switchTab('s'); tbE.onclick = () => switchTab('e');

  // --- CONTENT ---
  if (!blk || blk.type === 'container') pC.append(el('p', '', 'Add widgets to this container via the grid.'));
  else if (blk.type === 'text') pC.append(field('Text', txtInput(blk.text, v => { blk.text = v; upd(); })));
  else if (blk.type === 'image') pC.append(field('URL', txtInput(blk.src, v => { blk.src = v; upd(); })));
  else if (blk.type === 'button') {
    pC.append(field('Label', txtInput(blk.text, v => { blk.text = v; upd(); })));
    pC.append(field('Link URL', txtInput(blk.url, v => { blk.url = v; upd(); })));
  }

  // --- LAYOUT ---
  if (!blk || blk.type === 'container') {
    pL.append(field('Layout Mode', selInput([{v:'auto',l:'Auto Layout (Flex)'}, {v:'free',l:'Free (Absolute)'}], tgt.layoutMode || 'auto', v => { tgt.layoutMode = v; upd(); })));
    if (tgt.layoutMode !== 'free') {
      pL.append(field('Direction', selInput([{v:'column',l:'Vertical'}, {v:'row',l:'Horizontal'}], tgt.flexDirection || 'column', v => { tgt.flexDirection = v; upd(); })));
      pL.append(field('Align Items', selInput([{v:'flex-start',l:'Start'}, {v:'center',l:'Center'}, {v:'flex-end',l:'End'}, {v:'stretch',l:'Stretch'}], tgt.alignItems || 'stretch', v => { tgt.alignItems = v; upd(); })));
      pL.append(field('Justify', selInput([{v:'flex-start',l:'Start'}, {v:'center',l:'Center'}, {v:'flex-end',l:'End'}, {v:'space-between',l:'Space Between'}], tgt.justifyContent || 'flex-start', v => { tgt.justifyContent = v; upd(); })));
      pL.append(field('Gap (px)', numInput(tgt.gap, v => { tgt.gap = v; upd(); })));
      
      const padRow1 = el('div', 'ctl-row');
      padRow1.append(field('Pad Top', numInput(tgt.paddingT != null ? tgt.paddingT : tgt.paddingY, v => { tgt.paddingT = v; upd(); })));
      padRow1.append(field('Pad Bottom', numInput(tgt.paddingB != null ? tgt.paddingB : tgt.paddingY, v => { tgt.paddingB = v; upd(); })));
      const padRow2 = el('div', 'ctl-row');
      padRow2.append(field('Pad Left', numInput(tgt.paddingL, v => { tgt.paddingL = v; upd(); })));
      padRow2.append(field('Pad Right', numInput(tgt.paddingR, v => { tgt.paddingR = v; upd(); })));
      pL.append(padRow1, padRow2);
    }
  }
  
  if (blk) {
    pL.append(field('Width', numInput(tgt.width, v => { tgt.width = v; upd(); })));
    pL.append(field('Height', numInput(tgt.height, v => { tgt.height = v; upd(); })));
    const parentLayout = (findBlkDeep(sec.blocks, blk.id)?.parent === sec.blocks) ? sec.layoutMode : 'auto'; // simplistic check
    // If in free mode, show X/Y
    pL.append(field('X Position', numInput(tgt.x, v => { tgt.x = v; upd(); })));
    pL.append(field('Y Position', numInput(tgt.y, v => { tgt.y = v; upd(); })));
  }

  // --- STYLE ---
  pS.append(field('Background', colorInput(tgt.bg, v => { tgt.bg = v; upd(); })));
  if (blk && blk.type === 'text') {
    pS.append(field('Color', colorInput(tgt.color, v => { tgt.color = v; upd(); })));
    pS.append(field('Font Size', numInput(tgt.size, v => { tgt.size = v; upd(); })));
    pS.append(field('Align', selInput([{v:'left',l:'Left'}, {v:'center',l:'Center'}, {v:'right',l:'Right'}], tgt.align, v => { tgt.align = v; upd(); })));
  }
  if (tgt.type === 'shape' || tgt.type === 'image' || tgt.type === 'container') {
    pS.append(field('Border Radius', numInput(tgt.radius, v => { tgt.radius = v; upd(); })));
  }
  if (tgt.type === 'shape' && tgt.shapeType === 'polygon') {
    pS.append(field('Clip Path (CSS)', txtInput(tgt.clipPath, v => { tgt.clipPath = v; upd(); })));
  }

  // --- EFFECTS ---
  pE.append(field('Animation', selInput([
    {v:'',l:'None'},{v:'fade',l:'Fade'},{v:'slide-up',l:'Slide Up'},{v:'slide-left',l:'Slide Left'},
    {v:'zoom-in',l:'Zoom In'},{v:'bounce',l:'Bounce'},{v:'flip',l:'Flip'}
  ], tgt.animation, v => { tgt.animation = v; upd(); })));
  pE.append(field('Duration (s)', numInput(tgt.animDuration || 0.6, v => { tgt.animDuration = v; upd(); })));
  pE.append(field('Hover Effect', selInput([
    {v:'',l:'None'},{v:'grow',l:'Grow'},{v:'shrink',l:'Shrink'},{v:'float',l:'Float'},{v:'glow',l:'Glow'}
  ], tgt.hoverEffect, v => { tgt.hoverEffect = v; upd(); })));

  // Actions
  const acts = el('div', 'inspector-actions');
  acts.append(el('button', 'danger', '✕ Delete'));
  acts.lastChild.onclick = () => {
    if (blk) {
      const f = findBlkDeep(sec.blocks, blk.id);
      if (f) f.parent.splice(f.index, 1);
      selected.b = null;
    } else {
      cur().sections = cur().sections.filter(s => s.id !== sec.id);
      selected.s = null;
    }
    upd(); renderAll();
  };
  inspector.append(acts);
}

// Render Navigator Tree
function renderTree() {
  const t = document.getElementById('secList'); t.innerHTML = '';
  cur().sections.forEach((s, i) => {
    const sBtn = el('button', 'nav-tree-item ' + (selected.s === s.id && !selected.b ? 'active' : ''));
    sBtn.innerHTML = `<span>Section ${i+1}</span>`;
    sBtn.onclick = () => { selected = {s: s.id, b: null}; renderAll(); push(); };
    t.append(sBtn);

    const drawBlocks = (blocks, depth) => {
      if(!blocks) return;
      blocks.forEach(b => {
        const bBtn = el('button', 'nav-tree-item ' + (selected.b === b.id ? 'active' : ''));
        bBtn.style.paddingLeft = (depth * 12 + 10) + 'px';
        bBtn.innerHTML = `<span>↳ ${b.type}</span>`;
        bBtn.onclick = () => { selected = {s: s.id, b: b.id}; renderAll(); push(); };
        t.append(bBtn);
        if (b.blocks) drawBlocks(b.blocks, depth + 1);
      });
    };
    drawBlocks(s.blocks, 1);
  });
}

function renderAll() { renderInspector(); renderTree(); }

// Init
document.getElementById('blocksSaveBtn').onclick = async () => {
  if (!blocksDirty) return;
  document.getElementById('blocksSaveBtn').disabled = true;
  await fetch('/api/blocks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(blocksData) });
  blocksDirty = false;
  document.getElementById('blocksStatus').className = 'cms-bottom__status saved';
  document.getElementById('blocksStatus').textContent = 'Saved';
};

function loadPage(pageId, path) {
  currentPage = pageId;
  currentPagePath = path;
  selected = { s: null, b: null };
  document.getElementById('status').textContent = 'Loading...';
  document.getElementById('status').style.color = '#f87171';
  
  // Update UI
  document.querySelectorAll('.page-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.id === pageId);
  });
  
  // Load iframe
  frame.src = ORIGIN + path;
}

(async function init() {
  try {
    const r1 = await fetch('/api/pages');
    if (r1.ok) pagesData = await r1.json();
    
    const r2 = await fetch('/api/blocks');
    if (r2.ok) blocksData = await r2.json();
  } catch(e) {
    console.error('Failed to load data', e);
  }
  
  if (!blocksData.pages) blocksData.pages = {};
  
  // Render page pills
  const bar = document.getElementById('pageBar');
  bar.innerHTML = '';
  (pagesData.pages || []).forEach(p => {
    const btn = el('button', 'page-pill', p.title);
    btn.dataset.id = p.id;
    if (p.id === currentPage) btn.classList.add('active');
    btn.onclick = () => loadPage(p.id, p.path);
    bar.appendChild(btn);
  });

  // Initial load
  loadPage(currentPage, currentPagePath);
})();
</script>
</body>
